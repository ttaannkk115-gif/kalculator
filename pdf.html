<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VoltMaster Precision Zoom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --bg-color: #000; --card-bg: #1a1a1a; --text-gold: #f1c40f; --danger: #ff3b30; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); font-family: -apple-system, sans-serif; overflow: hidden; }

        #menu-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; z-index: 2000; background: var(--bg-color); overflow-y: auto; }
        .logo { font-size: 28px; font-weight: bold; color: var(--text-gold); margin-bottom: 30px; text-transform: uppercase; }
        .file-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        .file-item { background: var(--card-bg); padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; }

        #viewer-container { display: none; position: fixed; inset: 0; background: #000; z-index: 3000; touch-action: none; }
        .viewer-header { height: 60px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #222; position: relative; z-index: 4001; }
        #header-filename { color: var(--text-gold); font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .btn-close-top { color: var(--danger); font-size: 32px; font-weight: bold; cursor: pointer; }

        /* Область зума */
        #zoom-area { position: absolute; top: 60px; bottom: 0; left: 0; right: 0; overflow: hidden; background: #fff; }
        #viewer-wrapper { 
            position: absolute; 
            width: 100%; 
            transform-origin: center center; /* Будет меняться скриптом */
            will-change: transform;
        }
        .page-container { width: 100%; background: #fff; margin-bottom: 2px; }
        canvas { width: 100% !important; height: auto !important; display: block; }

        .btn-action { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-add { background: #3498db; color: white; }
        .btn-del { background: var(--danger); color: white; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div id="menu-screen">
    <div class="logo">VOLTMASTER</div>
    <div id="slots-container" class="file-list"></div>
</div>

<div id="viewer-container">
    <div class="viewer-header">
        <div id="header-filename">ФАЙЛ</div>
        <div class="btn-close-top" onclick="closeViewer()">✕</div>
    </div>
    <div id="zoom-area">
        <div id="viewer-wrapper"></div>
    </div>
</div>

<input type="file" id="file-input" accept="application/pdf">

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let activeSlot = null;
    let currentPdfDoc = null;

    // Логика трансформации
    const wrapper = document.getElementById('viewer-wrapper');
    const zoomArea = document.getElementById('zoom-area');

    let scale = 1, lastScale = 1;
    let pointX = 0, pointY = 0;
    let startX = 0, startY = 0;
    let isDragging = false;
    let initialDist = 0;

    window.onload = createMenu;

    function createMenu() {
        const container = document.getElementById('slots-container');
        container.innerHTML = '';
        for(let i=1; i<=5; i++) {
            const name = localStorage.getItem('pdf_name_' + i);
            container.innerHTML += `
                <div class="file-item">
                    <div class="file-info" style="flex:1; display:flex; align-items:center; gap:10px;" onclick="openSlot(${i})">
                        <span style="color:var(--text-gold)">${i}.</span>
                        <div style="font-size:14px;color:#eee;">${name ? name : 'Пустой слот'}</div>
                    </div>
                    <div class="controls">
                        ${name ? `<div class="btn-action btn-del" onclick="deleteFile(${i})">✕</div>` : `<div class="btn-action btn-add" onclick="triggerInput(${i})">+</div>`}
                    </div>
                </div>`;
        }
    }

    function triggerInput(s) { activeSlot = s; document.getElementById('file-input').click(); }
    function openSlot(s) { const d = localStorage.getItem('pdf_data_'+s); const n = localStorage.getItem('pdf_name_'+s); if(d) renderPDF(d, n); }
    function deleteFile(s) { if(confirm("Удалить?")) { localStorage.removeItem('pdf_data_'+s); localStorage.removeItem('pdf_name_'+s); createMenu(); } }

    document.getElementById('file-input').onchange = (e) => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = () => {
            localStorage.setItem('pdf_data_'+activeSlot, r.result);
            localStorage.setItem('pdf_name_'+activeSlot, f.name);
            createMenu(); renderPDF(r.result, f.name);
        };
        r.readAsDataURL(f);
    };

    async function renderPDF(data, filename) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('viewer-container').style.display = 'block';
        document.getElementById('header-filename').innerText = filename;
        
        wrapper.innerHTML = '<div style="color:black; padding:20px;">Загрузка...</div>';
        scale = 1; pointX = 0; pointY = 0;
        updateTransform();

        currentPdfDoc = await pdfjsLib.getDocument(data).promise;
        wrapper.innerHTML = '';
        
        for (let i = 1; i <= currentPdfDoc.numPages; i++) {
            const page = await currentPdfDoc.getPage(i);
            const vp = page.getViewport({ scale: 2.5 }); 
            const container = document.createElement('div');
            container.className = 'page-container';
            const canvas = document.createElement('canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            container.appendChild(canvas);
            wrapper.appendChild(container);
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        }
    }

    // ОБРАБОТКА ЖЕСТОВ
    zoomArea.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            
            // Находим центр между пальцами для точки увеличения
            const centerX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
            const centerY = (e.touches[0].pageY + e.touches[1].pageY) / 2 - 60; // -60 из-за хедера
            
            // Устанавливаем точку трансформации там, где пальцы
            wrapper.style.transformOrigin = `${centerX}px ${centerY}px`;
        } else if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].pageX - pointX;
            startY = e.touches[0].pageY - pointY;
        }
    });

    zoomArea.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 2) {
            const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            const zoomChange = currentDist / initialDist;
            scale = Math.min(Math.max(lastScale * zoomChange, 1), 8);
            updateTransform();
        } else if (e.touches.length === 1 && isDragging) {
            pointX = e.touches[0].pageX - startX;
            pointY = e.touches[0].pageY - startY;
            updateTransform();
        }
    });

    zoomArea.addEventListener('touchend', () => {
        isDragging = false;
        lastScale = scale;
    });

    function updateTransform() {
        wrapper.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
    }

    function closeViewer() {
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('viewer-container').style.display = 'none';
        currentPdfDoc = null;
    }
</script>
</body>
</html>
