<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VoltMaster 5 Slots</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { 
            --bg-color: #000000; 
            --card-bg: #1a1a1a; 
            --accent: #3498db; 
            --danger: #ff3b30; 
            --text-gold: #f1c40f;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); font-family: -apple-system, sans-serif; 
            color: white; overflow: hidden; 
        }

        /* ГЛАВНОЕ МЕНЮ */
        #menu-screen { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; padding: 40px 20px; z-index: 2000; 
            background: var(--bg-color); overflow-y: auto; 
        }
        
        .logo { font-size: 28px; font-weight: bold; color: var(--text-gold); letter-spacing: 2px; margin-bottom: 30px; }
        .file-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        
        .file-item { 
            background: var(--card-bg); padding: 15px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: space-between; 
            border: 1px solid #333;
        }
        
        .file-name-label { font-size: 14px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* ПРОСМОТРЩИК */
        #viewer-container { display: none; position: absolute; inset: 0; z-index: 1000; background: #000; }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .viewer-header {
            height: 60px; background: #000; display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #222;
        }
        
        /* ДИНАМИЧЕСКИЙ ЗАГОЛОВОК */
        #header-filename { 
            color: var(--text-gold); font-weight: bold; font-size: 14px; 
            text-transform: uppercase; white-space: nowrap; overflow: hidden; 
            text-overflow: ellipsis; max-width: 70%; 
        }
        
        .btn-close-top { color: var(--danger); font-size: 30px; font-weight: bold; cursor: pointer; padding: 5px; }

        /* ПОИСК */
        #search-float {
            position: fixed; top: 80px; right: 20px; width: 50px; height: 50px;
            background: #3498db; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; z-index: 3000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #search-input-box {
            position: fixed; top: 85px; right: 80px; display: none; z-index: 3001;
        }
        #search-input-box input {
            padding: 10px 15px; border-radius: 20px; border: 1px solid #3498db; width: 160px; outline: none; background: white; color: black;
        }

        /* ОБЛАСТЬ PDF */
        #viewer-wrapper { 
            width: 100%; height: calc(100% - 60px); overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center; background: #fff;
        }
        .page-container { width: 100%; display: flex; justify-content: center; background: #fff; margin-bottom: 5px; }
        canvas { width: 100% !important; height: auto !important; }

        /* КНОПКИ ДЕЙСТВИЙ */
        .btn-action { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-add { background: var(--accent); color: white; }
        .btn-del { background: var(--danger); color: white; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div id="menu-screen">
    <div class="logo">VOLTMASTER</div>
    <div id="slots-container" class="file-list"></div>
</div>

<div id="viewer-container">
    <div class="viewer-header">
        <div id="header-filename">НАЗВАНИЕ ФАЙЛА</div>
        <div class="btn-close-top" onclick="closeViewer()">✕</div>
    </div>

    <div id="search-input-box">
        <input type="text" id="search-input" placeholder="Поиск...">
    </div>
    <div id="search-float" onclick="toggleSearch()">🔍</div>

    <div id="viewer-wrapper"></div>
</div>

<input type="file" id="file-input" accept="application/pdf">

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let activeSlot = null;
    let currentPdfDoc = null;

    window.onload = createMenu;

    function createMenu() {
        const container = document.getElementById('slots-container');
        container.innerHTML = '';
        for(let i=1; i<=5; i++) {
            const name = localStorage.getItem('pdf_name_' + i);
            container.innerHTML += `
                <div class="file-item">
                    <div class="file-info" style="flex:1; display:flex; align-items:center; gap:10px;" onclick="openSlot(${i})">
                        <span style="color:var(--text-gold)">${i}.</span>
                        <div class="file-name-label">${name ? name : 'Пустой слот'}</div>
                    </div>
                    <div class="controls">
                        ${name ? `<div class="btn-action btn-del" onclick="deleteFile(${i})">✕</div>` : `<div class="btn-action btn-add" onclick="triggerInput(${i})">+</div>`}
                    </div>
                </div>`;
        }
    }

    function triggerInput(s) { activeSlot = s; document.getElementById('file-input').click(); }

    function openSlot(s) { 
        const d = localStorage.getItem('pdf_data_'+s); 
        const n = localStorage.getItem('pdf_name_'+s);
        if(d) renderPDF(d, n); 
    }

    function deleteFile(s) { 
        if(confirm("Удалить файл?")) { 
            localStorage.removeItem('pdf_data_'+s); 
            localStorage.removeItem('pdf_name_'+s); 
            createMenu(); 
        } 
    }

    function toggleSearch() {
        const box = document.getElementById('search-input-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
        if(box.style.display === 'block') document.getElementById('search-input').focus();
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        performSearch(e.target.value.toLowerCase().trim());
    });

    async function performSearch(query) {
        if(!query || !currentPdfDoc) return;
        for (let i = 1; i <= currentPdfDoc.numPages; i++) {
            const page = await currentPdfDoc.getPage(i);
            const text = await page.getTextContent();
            if(text.items.map(s => s.str).join("").toLowerCase().includes(query)) {
                document.getElementById('viewer-wrapper').children[i-1].scrollIntoView();
                break;
            }
        }
    }

    document.getElementById('file-input').onchange = (e) => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = () => {
            localStorage.setItem('pdf_data_'+activeSlot, r.result);
            localStorage.setItem('pdf_name_'+activeSlot, f.name);
            createMenu(); 
            renderPDF(r.result, f.name);
        };
        r.readAsDataURL(f);
    };

    async function renderPDF(data, filename) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('viewer-container').style.display = 'block';
        
        // УСТАНОВКА НАЗВАНИЯ В ХЕДЕР
        document.getElementById('header-filename').innerText = filename || "БЕЗ НАЗВАНИЯ";
        
        const wrapper = document.getElementById('viewer-wrapper');
        wrapper.innerHTML = '<div style="color:black; padding:20px;">Загрузка страниц...</div>';
        
        currentPdfDoc = await pdfjsLib.getDocument(data).promise;
        wrapper.innerHTML = '';
        
        for (let i = 1; i <= currentPdfDoc.numPages; i++) {
            const page = await currentPdfDoc.getPage(i);
            const vp = page.getViewport({ scale: 2 });
            const container = document.createElement('div');
            container.className = 'page-container';
            const canvas = document.createElement('canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            container.appendChild(canvas);
            wrapper.appendChild(container);
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        }
    }

    function closeViewer() {
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('viewer-container').style.display = 'none';
        currentPdfDoc = null;
        document.getElementById('search-input').value = '';
        document.getElementById('search-input-box').style.display = 'none';
    }
</script>
</body>
</html>
