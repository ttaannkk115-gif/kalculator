<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>VoltMaster 5 Slots Clean</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { 
            --bg-color: #000000; 
            --card-bg: #1a1a1a; 
            --accent: #3498db; 
            --danger: #ff3b30; 
            --text-gold: #f1c40f;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); font-family: -apple-system, sans-serif; 
            color: white;
        }

        /* ГЛАВНОЕ МЕНЮ */
        #menu-screen { 
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; padding: 40px 20px; z-index: 2000; 
            background: var(--bg-color); overflow-y: auto; 
        }
        
        .logo { font-size: 28px; font-weight: bold; color: var(--text-gold); letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        .file-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        
        .file-item { 
            background: var(--card-bg); padding: 15px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: space-between; 
            border: 1px solid #333;
        }
        
        .file-name-label { font-size: 14px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* ПРОСМОТРЩИК */
        #viewer-container { display: none; min-height: 100vh; background: #000; position: relative; }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .viewer-header {
            height: 60px; background: #000; display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; 
            position: sticky; top: 0; z-index: 4000; border-bottom: 1px solid #222;
        }
        
        #header-filename { 
            color: var(--text-gold); font-weight: bold; font-size: 14px; 
            text-transform: uppercase; white-space: nowrap; overflow: hidden; 
            text-overflow: ellipsis; max-width: 80%; 
        }
        
        .btn-close-top { color: var(--danger); font-size: 32px; font-weight: bold; cursor: pointer; padding: 5px; }

        /* ОБЛАСТЬ PDF */
        #viewer-wrapper { 
            width: 100%; display: flex; flex-direction: column; align-items: center; background: #fff;
        }
        .page-container { 
            width: 100%; display: flex; justify-content: center; background: #fff; margin-bottom: 2px;
        }
        canvas { max-width: 100%; height: auto !important; }

        /* КНОПКИ УПРАВЛЕНИЯ В МЕНЮ */
        .btn-action { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-add { background: var(--accent); color: white; }
        .btn-del { background: var(--danger); color: white; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div id="menu-screen">
    <div class="logo">VOLTMASTER</div>
    <div id="slots-container" class="file-list"></div>
</div>

<div id="viewer-container">
    <div class="viewer-header">
        <div id="header-filename">НАЗВАНИЕ ФАЙЛА</div>
        <div class="btn-close-top" onclick="closeViewer()">✕</div>
    </div>
    <div id="viewer-wrapper"></div>
</div>

<input type="file" id="file-input" accept="application/pdf">

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let activeSlot = null;
    let currentPdfDoc = null;

    window.onload = createMenu;

    // Создание списка слотов
    function createMenu() {
        const container = document.getElementById('slots-container');
        container.innerHTML = '';
        for(let i=1; i<=5; i++) {
            const name = localStorage.getItem('pdf_name_' + i);
            container.innerHTML += `
                <div class="file-item">
                    <div class="file-info" style="flex:1; display:flex; align-items:center; gap:10px;" onclick="openSlot(${i})">
                        <span style="color:var(--text-gold)">${i}.</span>
                        <div class="file-name-label">${name ? name : 'Пустой слот'}</div>
                    </div>
                    <div class="controls">
                        ${name ? `<div class="btn-action btn-del" onclick="deleteFile(${i})">✕</div>` : `<div class="btn-action btn-add" onclick="triggerInput(${i})">+</div>`}
                    </div>
                </div>`;
        }
    }

    function triggerInput(s) { activeSlot = s; document.getElementById('file-input').click(); }

    function openSlot(s) { 
        const d = localStorage.getItem('pdf_data_'+s); 
        const n = localStorage.getItem('pdf_name_'+s);
        if(d) renderPDF(d, n); 
    }

    function deleteFile(s) { 
        if(confirm("Удалить файл?")) { 
            localStorage.removeItem('pdf_data_'+s); 
            localStorage.removeItem('pdf_name_'+s); 
            createMenu(); 
        } 
    }

    // Загрузка файла
    document.getElementById('file-input').onchange = (e) => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = () => {
            try {
                localStorage.setItem('pdf_data_'+activeSlot, r.result);
                localStorage.setItem('pdf_name_'+activeSlot, f.name);
                createMenu(); 
                renderPDF(r.result, f.name);
            } catch (err) {
                alert("Память переполнена. Попробуйте файл меньшего размера.");
            }
        };
        r.readAsDataURL(f);
    };

    // Отрисовка PDF с поддержкой четкого зума
    async function renderPDF(data, filename) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('viewer-container').style.display = 'block';
        document.body.style.overflow = 'auto'; 
        
        document.getElementById('header-filename').innerText = filename || "БЕЗ НАЗВАНИЯ";
        
        const wrapper = document.getElementById('viewer-wrapper');
        wrapper.innerHTML = '<div style="color:black; padding:20px;">Загрузка прайса...</div>';
        
        try {
            currentPdfDoc = await pdfjsLib.getDocument(data).promise;
            wrapper.innerHTML = '';
            
            for (let i = 1; i <= currentPdfDoc.numPages; i++) {
                const page = await currentPdfDoc.getPage(i);
                const vp = page.getViewport({ scale: 2 }); // Высокое качество для зума
                const container = document.createElement('div');
                container.className = 'page-container';
                const canvas = document.createElement('canvas');
                canvas.width = vp.width; canvas.height = vp.height;
                container.appendChild(canvas);
                wrapper.appendChild(container);
                await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
            }
        } catch (err) {
            alert("Ошибка открытия файла");
            closeViewer();
        }
    }

    // Выход в меню
    function closeViewer() {
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('viewer-container').style.display = 'none';
        document.body.style.overflow = 'hidden';
        currentPdfDoc = null;
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
