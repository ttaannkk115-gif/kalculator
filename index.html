<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT MASTER PRO</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlZPTFQgTUFTVEVSIiwKICAic2hvcnRfbmFtZSI6ICJWLU1BU1RFUiIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGYwZjBmIiwKICAidGhlbWVfY29sb3ciOiAiI2ZmYzEwNyIsCiAgImljb25zIjogW3siInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZnJlZXBpay5jb20vNTEyLzI5MDUvMjkwNTIxMy5wbmciLCAic2l6ZXMiOiAiNTEyeDUxMiIsICJ0eXBlIjogImltYWdlL3BuZyJ9XQp9">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --main-gold: #ffc107;
            --dark-bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg); color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%);
            overflow-x: hidden;
        }

        .app-container { width: 92%; max-width: 380px; padding: 10px 0 100px 0; }

        /* Верхние маленькие кнопки */
        .top-nav { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .mini-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 193, 7, 0.2);
            color: var(--main-gold);
            padding: 5px 10px; border-radius: 8px; font-size: 10px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        /* Шапка */
        .header { text-align: center; margin-bottom: 20px; cursor: pointer; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .header span { color: var(--main-gold); }
        
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255, 193, 7, 0.05); padding: 5px 15px;
            border-radius: 20px; font-size: 10px; margin-top: 5px;
            border: 1px solid rgba(255, 193, 7, 0.1);
        }

        .status-dot { width: 7px; height: 7px; border-radius: 50%; }
        .online { background: var(--main-gold); box-shadow: 0 0 8px var(--main-gold); }
        .offline { background: #ff4444; box-shadow: 0 0 10px #ff4444; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Сетка меню */
        .menu-grid { display: grid; gap: 10px; }
        .menu-item {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px; padding: 15px; display: flex; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .icon-box { width: 42px; height: 42px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-right: 15px; font-size: 18px; background: rgba(255,193,7,0.1); color: var(--main-gold); }
        .menu-item h3 { margin: 0; font-size: 16px; font-weight: 600; }

        /* Оверлеи */
        .overlay { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; }
        #admin-overlay { z-index: 2000; }
        #app-overlay { z-index: 3000; }
        .overlay-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { background: none; border: none; color: #ff4444; font-size: 32px; cursor: pointer; line-height: 1; font-weight: bold; }

        /* Админка */
        .admin-stats { padding: 15px 20px; font-size: 20px; font-weight: 800; color: var(--main-gold); border-bottom: 1px solid #1a1a1a; }
        .admin-nav-btn { background: #111; border: 1px solid #333; color: var(--main-gold); padding: 12px; border-radius: 12px; margin: 10px 15px; text-align: center; cursor: pointer; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .date-divider { background: #111; color: var(--main-gold); padding: 10px; font-size: 12px; text-align: center; margin: 15px 15px 5px; border-radius: 8px; border: 1px solid #222; }
        .date-count { color: #000; background: var(--main-gold); padding: 2px 8px; border-radius: 10px; margin-left: 10px; font-size: 10px; }
        .log-item { padding: 12px 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }

        .footer { text-align: center; margin-top: 30px; font-size: 9px; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-nav">
        <button class="mini-btn" id="installBtn" onclick="installApp()">📲 Установить</button>
        <button class="mini-btn" onclick="enableNotif()">🔔 Уведомления</button>
    </div>

    <div class="header" id="main-logo">
        <h1>VOLT<span>MASTER</span></h1>
        <div class="status-badge">
            <div class="status-dot online" id="online-dot"></div>
            <span id="stats-display">ID: 0000 | ВСЕГО: 0</span>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="openApp('Прайс-лист', 'prais.html')"><div class="icon-box">💸</div><h3>Прайс-лист</h3></div>
        <div class="menu-item" onclick="openApp('Шабашки', 'shabashki.html')"><div class="icon-box">🛠</div><h3>Шабашки</h3></div>
        <div class="menu-item" onclick="openApp('Расчеты', 'izmerenie.html')"><div class="icon-box">⚡</div><h3>Расчеты</h3></div>
        <div class="menu-item" onclick="openApp('Объявления', 'avito.html')"><div class="icon-box">📢</div><h3>Объявления</h3></div>
        <div class="menu-item" onclick="openApp('Заметки', 'zametka.html')"><div class="icon-box">📝</div><h3>Заметки</h3></div>
        <div class="menu-item" onclick="openApp('Помощник', 'signa.html')"><div class="icon-box">💬</div><h3>Помощник</h3></div>
        <div class="menu-item" onclick="openApp('Перекур', 'igri.html')"><div class="icon-box">☕</div><h3>Перекур</h3></div>
    </div>
    <div class="footer">VOLT MASTER CLOUD 2026</div>
</div>

<div id="app-overlay" class="overlay">
    <div class="overlay-header">
        <span id="overlay-title" style="color:var(--main-gold); font-weight:bold; font-size:14px;">App</span>
        <button class="close-btn" onclick="closeApp()">&times;</button>
    </div>
    <div style="flex-grow:1; position:relative;"><iframe id="app-frame" name="app-frame"></iframe></div>
</div>

<div id="admin-overlay" class="overlay">
    <div class="overlay-header">
        <h2 style="color:var(--main-gold); margin:0; font-size:16px;">ADMIN PANEL</h2>
        <button class="close-btn" onclick="closeAdmin()">&times;</button>
    </div>
    <div class="admin-stats" id="today-visitors">СЕГОДНЯ ЗАШЛИ: 0</div>
    <div class="admin-nav-btn" onclick="openApp('Управление шабашками', 'admin.html')">🛠 УПРАВЛЕНИЕ ШАБАШКАМИ</div>
    <div id="log-container" style="flex-grow:1; overflow-y:auto;"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://kalculator-8e345-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let myID = localStorage.getItem('volt_master_uid') || "ID-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('volt_master_uid', myID);

    // Логика установки для Android
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.border = '1px solid #ffc107';
    });

    async function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
        } else {
            alert("Для установки:\n1. Нажмите 'Поделиться' или 'Три точки'\n2. Выберите 'На экран Домой'");
        }
    }

    function enableNotif() {
        Notification.requestPermission().then(p => {
            if(p === 'granted') alert("Уведомления включены!");
            else alert("Разрешите уведомления в настройках браузера");
        });
    }

    function initApp() {
        const now = new Date();
        const dateKey = now.toISOString().split('T')[0];
        const timeStr = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});

        // Логи посещения
        database.ref(`visits/${dateKey}/${myID}`).update({
            userId: myID, lastTime: timeStr, timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        database.ref(`visits/${dateKey}/${myID}/count`).transaction(c => (c || 0) + 1);
        database.ref(`registered_users/${myID}`).set(true);

        database.ref('registered_users').on('value', snap => {
            document.getElementById('stats-display').innerText = `ID: ${myID} | ВСЕГО: ${snap.numChildren()}`;
        });

        database.ref(".info/connected").on("value", s => {
            document.getElementById('online-dot').className = s.val() ? "status-dot online" : "status-dot offline";
        });
    }

    function loadAdminLogs() {
        const todayKey = new Date().toISOString().split('T')[0];
        database.ref('visits').on('value', snap => {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            const data = snap.val() || {};
            document.getElementById('today-visitors').innerText = `СЕГОДНЯ ЗАШЛИ: ${data[todayKey] ? Object.keys(data[todayKey]).length : 0}`;

            Object.keys(data).sort().reverse().forEach(date => {
                const dayCount = Object.keys(data[date]).length;
                container.innerHTML += `<div class="date-divider">--- ${date} --- <span class="date-count">ЛЮДЕЙ: ${dayCount}</span></div>`;
                Object.values(data[date]).forEach(v => {
                    container.innerHTML += `<div class="log-item">
                        <span><b>${v.userId}</b> <small style="color:#555">x${v.count || 1}</small></span>
                        <span style="color:var(--main-gold); font-weight:bold;">${v.lastTime || '--:--'}</span>
                    </div>`;
                });
            });
        });
    }

    function openApp(name, url) { 
        document.getElementById('overlay-title').innerText = name; 
        document.getElementById('app-frame').src = url + "?v=" + Date.now(); 
        document.getElementById('app-overlay').style.display = 'flex'; 
    }
    function closeApp() { document.getElementById('app-overlay').style.display = 'none'; document.getElementById('app-frame').src = 'about:blank'; }
    function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }

    let clicks = 0;
    document.getElementById('main-logo').onclick = () => {
        clicks++;
        if(clicks === 3) {
            if(prompt("Пароль:") === "Gazik0303") {
                document.getElementById('admin-overlay').style.display = 'flex';
                loadAdminLogs();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 1000);
    };

    document.addEventListener('DOMContentLoaded', initApp);

    // Service Worker для Офлайн-работы
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
        `));
    }
</script>
</body>
</html>
