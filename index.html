<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltMaster</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --main-gold: #ffc107;
            --dark-bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --red-notif: #ff4444;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg); color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%);
            overflow-x: hidden;
        }

        .app-container { width: 92%; max-width: 380px; padding: 10px 0 100px 0; }

        .top-nav { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .mini-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 193, 7, 0.2);
            color: var(--main-gold); padding: 5px 12px; border-radius: 8px; font-size: 10px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        .header { text-align: center; margin-bottom: 20px; cursor: pointer; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .header span { color: var(--main-gold); }
        
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255, 193, 7, 0.05); padding: 5px 15px;
            border-radius: 20px; font-size: 10px; margin-top: 5px; border: 1px solid rgba(255, 193, 7, 0.1);
        }

        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--main-gold); box-shadow: 0 0 8px var(--main-gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .menu-grid { display: grid; gap: 10px; }
        .menu-item {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px; padding: 15px; display: flex; align-items: center;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }

        .badge-inline {
            background: var(--red-notif); color: white; font-size: 10px; font-weight: 900;
            padding: 2px 8px; border-radius: 10px; margin-left: auto; display: none;
        }

        .icon-box { width: 42px; height: 42px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-right: 15px; font-size: 18px; background: rgba(255,193,7,0.1); color: var(--main-gold); }
        .menu-item h3 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }

        .overlay { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 2000; }
        .overlay-header { padding: 15px; display: flex; justify-content: flex-end; align-items: center; border-bottom: 1px solid #222; background: #000; }
        .close-btn { background: none; border: none; color: #ff4444; font-size: 32px; cursor: pointer; line-height: 1; padding: 0 10px; }
        iframe { width: 100%; height: 100%; border: none; flex-grow: 1; }

        /* Админка */
        #admin-content { overflow-y: auto; flex-grow: 1; padding-bottom: 30px; }
        .admin-stats-big { color: var(--main-gold); padding: 20px; font-size: 22px; font-weight: 800; }
        .admin-input-box { padding: 18px; background: #111; margin: 15px; border-radius: 20px; border: 2px solid var(--main-gold); }
        .admin-input-box textarea, .admin-input-box input {
            background: #000; border: 1px solid #333; color: #fff; padding: 12px; width: 100%;
            box-sizing: border-box; border-radius: 12px; margin-bottom: 12px; outline: none; font-family: inherit;
        }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .btn-admin { padding: 18px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; font-size: 11px; }
        .btn-gold { background: var(--main-gold); color: #000; }
        .btn-white { background: #fff; color: #000; }
        .btn-delete-msg { width: 100%; background: rgba(255, 68, 68, 0.1); border: 1px solid #400; color: #ff4444; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }

        .date-divider { color: var(--main-gold); padding: 10px; font-size: 12px; text-align: center; margin: 15px 0 5px; font-weight: bold; border-top: 1px solid #1a1a1a; }
        .log-item { padding: 15px 20px; border-bottom: 1px solid #111; }
        .log-row-top { display: flex; justify-content: space-between; }
        .log-id { font-size: 18px; font-weight: bold; color: #fff; }
        .log-time-last { color: var(--main-gold); font-size: 16px; font-weight: bold; }
        .log-history { color: #666; font-size: 11px; margin-top: 5px; }

        @keyframes slideIn { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-nav">
        <button class="mini-btn" onclick="handleInstall()">📲 Установить</button>
        <button class="mini-btn" onclick="initNotifications()">🔔 Уведомления</button>
    </div>

    <div class="header" id="main-logo">
        <h1>VOLT<span>MASTER</span></h1>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="stats-display">ID: ${userID}</span>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="openApp('Прайс-лист', 'prais.html')"><div class="icon-box">💸</div><h3>Прайс-лист</h3></div>
        <div class="menu-item" onclick="handleShabashkiClick()"><div class="icon-box">🛠</div><h3>Шабашки <span id="shabash-count" class="badge-inline">0</span></h3></div>
        <div class="menu-item" onclick="openApp('Расчеты', 'izmerenie.html')"><div class="icon-box">⚡</div><h3>Расчеты</h3></div>
        <div class="menu-item" onclick="openApp('Объявления', 'avito.html')"><div class="icon-box">📢</div><h3>Доска объявлений</h3></div>
        <div class="menu-item" onclick="openApp('Заметки', 'zametka.html')"><div class="icon-box">📝</div><h3>Заметки</h3></div>
        <div class="menu-item" onclick="openApp('Помощник', 'signa.html')"><div class="icon-box">💬</div><h3>Чат-помощник</h3></div>
        <div class="menu-item" onclick="openApp('Перекур', 'igri.html')"><div class="icon-box">☕</div><h3>Перекур</h3></div>
    </div>
</div>

<div id="app-overlay" class="overlay">
    <div class="overlay-header"><span id="overlay-title" style="color:var(--main-gold); margin-right:auto; font-weight:bold;"></span><button class="close-btn" onclick="closeApp()">&times;</button></div>
    <iframe id="app-frame"></iframe>
</div>

<div id="admin-overlay" class="overlay">
    <div class="overlay-header"><button class="close-btn" onclick="closeAdmin()">&times;</button></div>
    <div id="admin-content"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-dIC8bm8y4kaY7RXmMrys2wOMLA5o8vY",
        authDomain: "voltmaster-332c0.firebaseapp.com",
        databaseURL: "https://voltmaster-332c0-default-rtdb.firebaseio.com",
        projectId: "voltmaster-332c0",
        storageBucket: "voltmaster-332c0.firebasestorage.app",
        messagingSenderId: "312337098429",
        appId: "1:312337098429:web:663e0f6787bd62d19bf9d4"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let userID = localStorage.getItem('volt_master_uid') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('volt_master_uid', userID);

    function initApp() {
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js?v=12');

        const now = new Date();
        const dateKey = now.toISOString().split('T')[0];
        const timeStr = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
        
        // Логи входа
        database.ref(`visits/${dateKey}/ID-${userID}`).once('value', snap => {
            const d = snap.val() || { count: 0, allTimes: "" };
            database.ref(`visits/${dateKey}/ID-${userID}`).update({
                id: userID, count: d.count + 1, lastTime: timeStr,
                allTimes: d.allTimes ? d.allTimes + ", " + timeStr : timeStr,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        });

        // Статистика
        database.ref('registered_users/ID-' + userID).set(true);
        database.ref('registered_users').on('value', snap => {
            document.getElementById('stats-display').innerText = `ID: ${userID} | ВСЕГО: ${snap.numChildren()}`;
        });

        // ОБЩИЕ СООБЩЕНИЯ
        database.ref('global_message').on('value', snap => {
            const val = snap.val();
            if (val && localStorage.getItem('read_global') !== val) {
                showVoltMessage("ОБЩЕЕ ОБЪЯВЛЕНИЕ", val, 'global');
            } else if (!val) {
                const ex = document.getElementById('volt-notif-global');
                if (ex) ex.remove();
            }
        });

        // ЛИЧНЫЕ СООБЩЕНИЯ (Всегда показываем, если есть в базе)
        database.ref('private_messages/' + userID).on('value', snap => {
            const val = snap.val();
            if (val) {
                showVoltMessage("ЛИЧНОЕ СООБЩЕНИЕ", val, 'private');
            } else {
                const ex = document.getElementById('volt-notif-private');
                if (ex) ex.remove();
            }
        });

        watchShabashki();
    }

    function showVoltMessage(title, text, type) {
        const msgId = 'volt-notif-' + type;
        let msgBox = document.getElementById(msgId);
        if (!msgBox) {
            msgBox = document.createElement('div');
            msgBox.id = msgId;
            msgBox.style = "position:fixed; top:20px; left:50%; transform:translateX(-50%); width:85%; background:#1a1a1a; border:2px solid var(--main-gold); border-radius:15px; padding:20px; z-index:5000; box-shadow:0 10px 30px rgba(0,0,0,0.8); text-align:center; animation: slideIn 0.3s ease-out;";
            document.body.appendChild(msgBox);
        }
        msgBox.innerHTML = `
            <div style="color:var(--main-gold); font-weight:bold; font-size:12px; margin-bottom:10px;">${title}</div>
            <div style="color:#fff; font-size:16px; margin-bottom:15px; line-height:1.4;">${text}</div>
            <button onclick="closeMsg('${type}', '${text.replace(/'/g, "\\'")}')" style="background:var(--main-gold); border:none; padding:10px 30px; border-radius:10px; font-weight:bold; cursor:pointer;">ПОНЯЛ</button>
        `;
    }

    function closeMsg(type, text) {
        if (type === 'global') localStorage.setItem('read_global', text);
        const el = document.getElementById('volt-notif-' + type);
        if (el) el.remove();
        if (type === 'private') database.ref('private_messages/' + userID).remove();
    }

    function adminSend(type) {
        const txt = document.getElementById('adm-txt').value.trim();
        const tid = document.getElementById('adm-id').value.trim();
        if (!txt) return;
        if (type === 'global') {
            database.ref('global_message').set(txt).then(() => alert("Отправлено всем!"));
        } else {
            if (!tid) { alert("Введите ID!"); return; }
            database.ref('private_messages/' + tid).set(txt).then(() => alert("Личное отправлено для " + tid));
        }
    }

    function clearGlobal() {
        if (confirm("Удалить у всех?")) database.ref('global_message').set(null);
    }

    function loadLogs() {
        database.ref('visits').on('value', snap => {
            const container = document.getElementById('admin-content');
            const data = snap.val() || {};
            const today = new Date().toISOString().split('T')[0];
            let html = `
                <div class="admin-stats-big">СЕГОДНЯ: ${data[today] ? Object.keys(data[today]).length : 0}</div>
                <div class="admin-input-box">
                    <textarea id="adm-txt" rows="3" placeholder="Текст..."></textarea>
                    <input type="text" id="adm-id" placeholder="ID получателя">
                    <div class="btn-row">
                        <button class="btn-admin btn-gold" onclick="adminSend('private')">ЛИЧНОЕ</button>
                        <button class="btn-admin btn-white" onclick="adminSend('global')">ОБЩЕЕ</button>
                    </div>
                    <button class="btn-delete-msg" onclick="clearGlobal()">× УДАЛИТЬ ОБЩЕЕ</button>
                </div>
                <button class="btn-admin btn-white" style="width:92%; margin:0 15px 20px;" onclick="closeAdmin(); openApp('Управление', 'volt.html')">🛠 АДМИНКА ШАБАШЕК</button>
            `;
            Object.keys(data).sort().reverse().forEach(date => {
                html += `<div class="date-divider">${date}</div>`;
                Object.values(data[date]).sort((a,b) => b.timestamp - a.timestamp).forEach(v => {
                    html += `<div class="log-item"><div class="log-row-top"><b>${v.id} (x${v.count})</b><span>${v.lastTime}</span></div><div class="log-history">${v.allTimes}</div></div>`;
                });
            });
            container.innerHTML = html;
        });
    }

    function openApp(name, url) {
        document.getElementById('overlay-title').innerText = name.toUpperCase();
        document.getElementById('app-frame').src = url + "?v=" + Date.now();
        document.getElementById('app-overlay').style.display = 'flex';
    }
    function closeApp() { document.getElementById('app-overlay').style.display = 'none'; document.getElementById('app-frame').src = ''; }
    function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }

    let clicks = 0;
    document.getElementById('main-logo').onclick = () => {
        if(++clicks === 3) {
            if(prompt("Пароль:") === "Gazik0303") { document.getElementById('admin-overlay').style.display = 'flex'; loadLogs(); }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 1000);
    };

    function watchShabashki() {
        database.ref('shabashki/active').on('value', snap => {
            const count = Object.keys(snap.val() || {}).length;
            const last = parseInt(localStorage.getItem('shabash_seen') || 0);
            const b = document.getElementById('shabash-count');
            if (count > last) { b.innerText = "+" + (count - last); b.style.display = 'inline-block'; } 
            else b.style.display = 'none';
        });
    }

    function handleShabashkiClick() {
        database.ref('shabashki/active').once('value', snap => {
            localStorage.setItem('shabash_seen', Object.keys(snap.val() || {}).length);
            document.getElementById('shabash-count').style.display = 'none';
            openApp('Шабашки', 'shabashki.html');
        });
    }

    function initNotifications() { alert("Система готова!"); }
    function handleInstall() { alert("Нажми 'Поделиться' -> 'Домой'"); }

    window.onload = initApp;
</script>
</body>
</html>
