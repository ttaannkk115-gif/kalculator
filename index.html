<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoltMaster</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-messaging-compat.js"></script>

    <style>
        :root {
            --main-gold: #ffc107;
            --dark-bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --red-notif: #ff4444;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg); color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%);
            overflow-x: hidden;
        }

        .app-container { width: 92%; max-width: 380px; padding: 10px 0 100px 0; }

        .top-nav { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .mini-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 193, 7, 0.2);
            color: var(--main-gold); padding: 5px 12px; border-radius: 8px; font-size: 10px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        .header { text-align: center; margin-bottom: 20px; cursor: pointer; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .header span { color: var(--main-gold); }
        
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255, 193, 7, 0.05); padding: 5px 15px;
            border-radius: 20px; font-size: 10px; margin-top: 5px; border: 1px solid rgba(255, 193, 7, 0.1);
        }

        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--main-gold); box-shadow: 0 0 8px var(--main-gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .menu-grid { display: grid; gap: 10px; }
        .menu-item {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px; padding: 15px; display: flex; align-items: center;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }

        .badge-inline {
            background: var(--red-notif); color: white; font-size: 10px; font-weight: 900;
            padding: 2px 8px; border-radius: 10px; margin-left: auto; display: none;
        }

        .icon-box { width: 42px; height: 42px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-right: 15px; font-size: 18px; background: rgba(255,193,7,0.1); color: var(--main-gold); }
        .menu-item h3 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }

        .overlay { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 2000; }
        .overlay-header { padding: 15px; display: flex; justify-content: flex-end; align-items: center; border-bottom: 1px solid #222; background: #000; }
        .close-btn { background: none; border: none; color: #ff4444; font-size: 32px; cursor: pointer; line-height: 1; padding: 0 10px; }
        iframe { width: 100%; height: 100%; border: none; flex-grow: 1; }

        #admin-content { overflow-y: auto; flex-grow: 1; padding-bottom: 30px; }
        .admin-stats-big { color: var(--main-gold); padding: 20px 20px; font-size: 22px; font-weight: 800; text-transform: uppercase; }
        .admin-nav-btn { background: #111; border: 1px solid #333; color: var(--main-gold); padding: 18px; border-radius: 12px; margin: 0 15px 20px; text-align: center; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .date-divider { color: var(--main-gold); padding: 10px; font-size: 12px; text-align: center; margin: 15px 0 5px; font-weight: bold; border-top: 1px solid #1a1a1a; background: rgba(255,193,7,0.02); }
        .log-item { padding: 15px 20px; border-bottom: 1px solid #111; }
        .log-row-top { display: flex; justify-content: space-between; align-items: baseline; }
        .log-id { font-size: 18px; font-weight: bold; color: #fff; }
        .log-count { color: var(--main-gold); font-size: 14px; margin-left: 8px; }
        .log-time-last { color: var(--main-gold); font-size: 16px; font-weight: bold; }
        .log-history { color: #666; font-size: 12px; line-height: 1.6; margin-top: 4px; }
        .clear-btn { background: #ff4444; color: white; border: none; padding: 18px; border-radius: 15px; width: 92%; margin: 20px auto; font-weight: bold; cursor: pointer; display: block; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="ios-instruction" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 20px; border-radius: 15px; width: 85%; max-width: 320px; display: none; z-index: 4000; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.7);">
    <div style="font-size: 24px; margin-bottom: 10px;">📲</div>
    Для iPhone: Нажми <b>«Поделиться»</b> и выбери <b>«На экран „Домой“»</b>.
    <br><br>
    <button onclick="this.parentElement.style.display='none'" style="border:none; background:var(--main-gold); padding:8px 20px; border-radius:8px; font-weight:bold;">ОК</button>
</div>

<div class="app-container">
    <div class="top-nav">
        <button class="mini-btn" onclick="handleInstall()">📲 Установить</button>
        <button class="mini-btn" onclick="initNotifications()">🔔 Уведомления</button>
    </div>

    <div class="header" id="main-logo">
        <h1>VOLT<span>MASTER</span></h1>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="stats-display">ID: ---- | ВСЕГО: 0</span>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="openApp('Прайс-лист', 'prais.html')"><div class="icon-box">💸</div><h3>Прайс-лист</h3></div>
        <div class="menu-item" onclick="handleShabashkiClick()"><div class="icon-box">🛠</div><h3>Шабашки <span id="shabash-count" class="badge-inline">0</span></h3></div>
        <div class="menu-item" onclick="openApp('Расчеты', 'izmerenie.html')"><div class="icon-box">⚡</div><h3>Расчеты</h3></div>
        <div class="menu-item" onclick="openApp('Объявления', 'avito.html')"><div class="icon-box">📢</div><h3>Доска объявлений</h3></div>
        <div class="menu-item" onclick="openApp('Заметки', 'zametka.html')"><div class="icon-box">📝</div><h3>Заметки</h3></div>
        <div class="menu-item" onclick="openApp('Помощник', 'signa.html')"><div class="icon-box">💬</div><h3>Чат-помощник</h3></div>
        <div class="menu-item" onclick="openApp('Перекур', 'igri.html')"><div class="icon-box">☕</div><h3>Перекур</h3></div>
    </div>
</div>

<div id="app-overlay" class="overlay">
    <div class="overlay-header">
        <span id="overlay-title" style="color:var(--main-gold); font-weight:bold; font-size:14px; margin-right: auto;"></span>
        <button class="close-btn" onclick="closeApp()">&times;</button>
    </div>
    <iframe id="app-frame"></iframe>
</div>

<div id="admin-overlay" class="overlay">
    <div class="overlay-header">
        <button class="close-btn" onclick="closeAdmin()">&times;</button>
    </div>
    <div id="admin-content"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-dIC8bm8y4kaY7RXmMrys2wOMLA5o8vY",
        authDomain: "voltmaster-332c0.firebaseapp.com",
        databaseURL: "https://voltmaster-332c0-default-rtdb.firebaseio.com",
        projectId: "voltmaster-332c0",
        storageBucket: "voltmaster-332c0.firebasestorage.app",
        messagingSenderId: "312337098429",
        appId: "1:312337098429:web:663e0f6787bd62d19bf9d4"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let userID = localStorage.getItem('volt_master_uid') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('volt_master_uid', userID);

    function initApp() {
        database.ref('registered_users/ID-' + userID).update({
            id: userID,
            last_entry: firebase.database.ServerValue.TIMESTAMP
        });

        database.ref('registered_users').on('value', snap => {
            const count = snap.numChildren();
            document.getElementById('stats-display').innerText = `ID: ${userID} | ВСЕГО: ${count}`;
        });

        watchShabashki();
    }

    function initNotifications() {
        const messaging = firebase.messaging();
        Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
                messaging.getToken({ vapidKey: 'BGNQzIvGew0uQqFsOOLYdy8FATmZ_vX1Y6xWgqn7uggV_vTSaD3bGL7VOVD5Xllad74NgOYKkYekWNL-3tgN_cQ' })
                .then((token) => {
                    if (token) {
                        // Сохраняем токен в папку для сервера Amvera
                        database.ref('fcm_tokens/' + userID).set(token);
                        alert("Уведомления успешно настроены!");
                    }
                });
            } else {
                alert("Нужно разрешить уведомления в браузере!");
            }
        });
    }

    function openApp(name, url) {
        document.getElementById('overlay-title').innerText = name.toUpperCase();
        document.getElementById('app-frame').src = url + "?v=" + Date.now();
        document.getElementById('app-overlay').style.display = 'flex';
    }

    function closeApp() {
        document.getElementById('app-overlay').style.display = 'none';
        document.getElementById('app-frame').src = '';
    }

    function watchShabashki() {
        database.ref('shabashki/active').on('value', snap => {
            const data = snap.val() || {};
            const count = Object.keys(data).length;
            const lastSeen = parseInt(localStorage.getItem('shabash_seen') || 0);
            const badge = document.getElementById('shabash-count');
            if (count > lastSeen) {
                badge.innerText = "+" + (count - lastSeen);
                badge.style.display = 'inline-block';
            } else badge.style.display = 'none';
        });
    }

    function handleShabashkiClick() {
        database.ref('shabashki/active').once('value', snap => {
            const count = Object.keys(snap.val() || {}).length;
            localStorage.setItem('shabash_seen', count);
            document.getElementById('shabash-count').style.display = 'none';
            openApp('Шабашки', 'shabashki.html');
        });
    }

    // ЛОГИКА АДМИНКИ (3 клика на лого)
    let clicks = 0;
    document.getElementById('main-logo').onclick = () => {
        clicks++;
        if(clicks === 3) {
            const pass = prompt("Пароль:");
            if(pass === "Gazik0303") {
                document.getElementById('admin-overlay').style.display = 'flex';
                loadLogs(); 
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 1000);
    };

    function loadLogs() {
        database.ref('visits').on('value', snap => {
            const container = document.getElementById('admin-content');
            const data = snap.val() || {};
            const today = new Date().toISOString().split('T')[0];
            const todayCount = data[today] ? Object.keys(data[today]).length : 0;

            let html = `
                <div class="admin-stats-big">СЕГОДНЯ ЗАШЛИ: ${todayCount}</div>
                <div class="admin-nav-btn" onclick="closeAdmin(); openApp('Управление', 'volt.html')">🛠 УПРАВЛЕНИЕ ШАБАШКАМИ</div>
            `;

            Object.keys(data).sort().reverse().forEach(date => {
                const dayData = data[date];
                html += `<div class="date-divider">--- ${date} --- (${Object.keys(dayData).length})</div>`;
                Object.values(dayData).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)).forEach(v => {
                    html += `
                        <div class="log-item">
                            <div class="log-row-top">
                                <div><span class="log-id">${v.id || '---'}</span><span class="log-count">x${v.count || 1}</span></div>
                                <span class="log-time-last">${v.lastTime || '--:--'}</span>
                            </div>
                            <div class="log-history">| • ${v.allTimes || 'нет данных'}</div>
                        </div>`;
                });
            });

            html += `<button class="clear-btn" onclick="clearLogs()">ОЧИСТИТЬ ВСЕ ЛОГИ</button>`;
            container.innerHTML = html;
        });
    }

    function clearLogs() {
        if(confirm("Удалить всю историю посещений?")) database.ref('visits').remove();
    }

    function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; }

    function handleInstall() {
        if (/iPad|iPhone|iPod/.test(navigator.userAgent)) document.getElementById('ios-instruction').style.display = 'block';
        else alert("Используйте меню браузера 'На экран Домой'");
    }

    window.onload = initApp;
</script>
</body>
</html>
