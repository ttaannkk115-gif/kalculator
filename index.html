<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT MASTER ULTIMATE</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlZPTFQgTUFTVEVSIiwKICAic2hvcnRfbmFtZSI6ICJWLU1BU1RFUiIsCi2ic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwZjBmMGYiLAogICJ0aGVtZV9jb2xvciI6ICIjZmZjMTA3IiwKICAiaWNvbnMiOiBbeyJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZyZWVwaWsuY29tLzUxMi8yOTA1LzI5MDUyMTMucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmcifV0KfQ==">

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --main-gold: #ffc107;
            --dark-bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --red-notif: #ff4444;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg); color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%);
        }

        .app-container { width: 92%; max-width: 380px; padding: 10px 0 100px 0; }

        .top-nav { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .mini-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 193, 7, 0.2);
            color: var(--main-gold); padding: 5px 12px; border-radius: 8px; font-size: 10px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        .header { text-align: center; margin-bottom: 20px; cursor: pointer; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .header span { color: var(--main-gold); }
        
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255, 193, 7, 0.05); padding: 5px 15px;
            border-radius: 20px; font-size: 10px; margin-top: 5px; border: 1px solid rgba(255, 193, 7, 0.1);
        }

        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--main-gold); box-shadow: 0 0 8px var(--main-gold); }

        .menu-grid { display: grid; gap: 10px; }
        .menu-item {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px; padding: 15px; display: flex; align-items: center;
            cursor: pointer; position: relative;
        }

        .badge-inline {
            background: var(--red-notif); color: white; font-size: 10px; font-weight: 900;
            padding: 2px 8px; border-radius: 10px; margin-left: auto; display: none;
        }

        .icon-box { width: 42px; height: 42px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-right: 15px; font-size: 18px; background: rgba(255,193,7,0.1); color: var(--main-gold); }
        .menu-item h3 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }

        .overlay { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 2000; }
        .overlay-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { background: none; border: none; color: #ff4444; font-size: 32px; cursor: pointer; }

        /* Стили админки как на скрине */
        .admin-stats { padding: 15px 20px; font-size: 18px; font-weight: 800; color: var(--main-gold); border-bottom: 1px solid #1a1a1a; }
        .admin-nav-btn { background: #111; border: 1px solid #333; color: var(--main-gold); padding: 15px; border-radius: 12px; margin: 10px 15px; text-align: center; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .date-divider { background: #111; color: var(--main-gold); padding: 8px; font-size: 11px; text-align: center; margin: 15px 15px 5px; border-radius: 8px; font-weight: bold; border: 1px solid #222; }
        
        .log-item { padding: 12px 20px; border-bottom: 1px solid #111; position: relative; }
        .log-id { font-size: 15px; font-weight: bold; color: #fff; }
        .log-count { color: var(--main-gold); font-size: 13px; margin-left: 5px; }
        .log-time-main { float: right; color: var(--main-gold); font-size: 14px; }
        .log-history { color: #666; font-size: 11px; margin-top: 6px; line-height: 1.4; padding-left: 10px; border-left: 1px solid #333; }
        
        .clear-btn { background: #ff4444; color: white; border: none; padding: 15px; border-radius: 12px; width: 90%; margin: 20px auto; font-weight: bold; cursor: pointer; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-nav">
        <button class="mini-btn" id="installBtn" onclick="installApp()">📲 Установить</button>
        <button class="mini-btn" onclick="enableNotif()">🔔 Уведомления</button>
    </div>

    <div class="header" id="main-logo">
        <h1>VOLT<span>MASTER</span></h1>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="stats-display">ID: 0000</span>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="openApp('Прайс-лист', 'prais.html')"><div class="icon-box">💸</div><h3>Прайс-лист</h3></div>
        <div class="menu-item" onclick="handleShabashkiClick()"><div class="icon-box">🛠</div><h3>Шабашки <span id="shabash-count" class="badge-inline">0</span></h3></div>
        <div class="menu-item" onclick="openApp('Расчеты', 'izmerenie.html')"><div class="icon-box">⚡</div><h3>Расчеты</h3></div>
        <div class="menu-item" onclick="openApp('Объявления', 'avito.html')"><div class="icon-box">📢</div><h3>Доска объявлений</h3></div>
        <div class="menu-item" onclick="openApp('Заметки', 'zametka.html')"><div class="icon-box">📝</div><h3>Заметки</h3></div>
        <div class="menu-item" onclick="openApp('Помощник', 'signa.html')"><div class="icon-box">💬</div><h3>Чат-помощник</h3></div>
        <div class="menu-item" onclick="openApp('Перекур', 'igri.html')"><div class="icon-box">☕</div><h3>Перекур</h3></div>
    </div>
</div>

<div id="app-overlay" class="overlay">
    <div class="overlay-header">
        <span id="overlay-title" style="color:var(--main-gold); font-weight:bold;">App</span>
        <button class="close-btn" onclick="closeApp()">&times;</button>
    </div>
    <iframe id="app-frame"></iframe>
</div>

<div id="admin-overlay" class="overlay">
    <div class="overlay-header">
        <h2 style="color:var(--main-gold); margin:0; font-size:16px;">ADMIN PANEL</h2>
        <button class="close-btn" onclick="closeAdmin()">&times;</button>
    </div>
    <div class="admin-stats" id="today-visitors">СЕГОДНЯ ЗАШЛИ: 0</div>
    <div class="admin-nav-btn" onclick="openAdminWork()">🛠 УПРАВЛЕНИЕ ШАБАШКАМИ</div>
    <div id="log-container" style="flex-grow:1; overflow-y:auto;"></div>
    <button class="clear-btn" onclick="clearLogs()">ОЧИСТИТЬ ВСЕ ЛОГИ</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://voltmaster-332c0-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let myID = localStorage.getItem('volt_master_uid') || "ID-" + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('volt_master_uid', myID);
    
    let isAdminWorkActive = false;
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

    async function installApp() {
        if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } 
        else { alert("Меню -> Добавить на главный экран"); }
    }

    function enableNotif() {
        Notification.requestPermission().then(p => alert(p === "granted" ? "Включено!" : "Запрещено"));
    }

    // История заходов
    function initApp() {
        const now = new Date();
        const dateKey = now.toISOString().split('T')[0];
        const timeStr = now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        
        const userRef = database.ref(`visits/${dateKey}/${myID}`);
        userRef.once('value', s => {
            let data = s.val() || { allTimes: "" };
            let times = data.allTimes || "";
            if (!times.includes(timeStr)) times += (times ? ", " : "") + timeStr;
            userRef.update({ id: myID, lastTime: timeStr, allTimes: times, timestamp: firebase.database.ServerValue.TIMESTAMP });
        });
        database.ref(`visits/${dateKey}/${myID}/count`).transaction(c => (c || 0) + 1);
        database.ref('registered_users').on('value', snap => {
            document.getElementById('stats-display').innerText = `ID: ${myID} | ВСЕГО: ${snap.numChildren()}`;
        });
        watchShabashki();
    }

    // ОБНОВЛЕННАЯ ЗАГРУЗКА ЛОГОВ (СТИЛЬ СКРИНШОТА)
    function loadLogs() {
        database.ref('visits').on('value', snap => {
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            const data = snap.val() || {};
            
            Object.keys(data).sort().reverse().forEach(date => {
                const dayData = data[date];
                const usersCount = Object.keys(dayData).length;
                container.innerHTML += `<div class="date-divider">--- ${date} --- (Человек: ${usersCount})</div>`;
                
                Object.values(dayData).forEach(v => {
                    const dId = v.id || v.userId || "Unknown";
                    const dTime = v.lastTime || v.time || "--:--";
                    const history = v.allTimes || dTime;
                    
                    container.innerHTML += `
                        <div class="log-item">
                            <span class="log-time-main">${dTime}</span>
                            <span class="log-id">${dId}</span>
                            <span class="log-count">x${v.count || 1}</span>
                            <div class="log-history">• ${history}</div>
                        </div>`;
                });
            });
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('today-visitors').innerText = `СЕГОДНЯ ЗАШЛИ: ${data[today] ? Object.keys(data[today]).length : 0}`;
        });
    }

    // Навигация
    function openApp(name, url) {
        document.getElementById('overlay-title').innerText = name;
        document.getElementById('app-frame').src = url + "?v=" + Date.now();
        document.getElementById('app-overlay').style.display = 'flex';
    }

    function openAdminWork() {
        isAdminWorkActive = true;
        document.getElementById('admin-overlay').style.display = 'none';
        openApp('Управление', 'admin.html');
    }

    function closeApp() {
        document.getElementById('app-overlay').style.display = 'none';
        document.getElementById('app-frame').src = '';
        if (isAdminWorkActive) {
            document.getElementById('admin-overlay').style.display = 'flex';
            isAdminWorkActive = false;
        }
    }

    function closeAdmin() { document.getElementById('admin-overlay').style.display = 'none'; isAdminWorkActive = false; }
    function clearLogs() { if(confirm("Очистить историю?")) database.ref('visits').remove(); }

    let lastSeenCount = localStorage.getItem('shabash_seen_total') || 0;
    function watchShabashki() {
        database.ref('shabashki/active').on('value', (snap) => {
            const orders = snap.val() || {};
            const total = Object.keys(orders).length;
            const badge = document.getElementById('shabash-count');
            if (total > lastSeenCount) {
                badge.innerText = "+" + (total - lastSeenCount);
                badge.style.display = 'inline-block';
            } else { badge.style.display = 'none'; }
        });
    }
    function handleShabashkiClick() {
        database.ref('shabashki/active').once('value', snap => {
            lastSeenCount = Object.keys(snap.val() || {}).length;
            localStorage.setItem('shabash_seen_total', lastSeenCount);
            document.getElementById('shabash-count').style.display = 'none';
            openApp('Шабашки', 'shabashki.html');
        });
    }

    let clicks = 0;
    document.getElementById('main-logo').onclick = () => {
        clicks++;
        if(clicks === 3) {
            if(prompt("Пароль:") === "Gazik0303") {
                document.getElementById('admin-overlay').style.display = 'flex';
                loadLogs();
            }
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 1000);
    };

    window.onload = initApp;
</script>
</body>
</html>
