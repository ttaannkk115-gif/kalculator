<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-dIC8bm8y4kaY7RXmMrys2wOMLA5o8vY",
        authDomain: "voltmaster-332c0.firebaseapp.com",
        databaseURL: "https://voltmaster-332c0-default-rtdb.firebaseio.com",
        projectId: "voltmaster-332c0",

        messagingSenderId: "312337098429",
        appId: "1:312337098429:web:663e0f6787bd62d19bf9d4"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let userID = localStorage.getItem('volt_master_uid') || Math.floor(1000 + Math.random() * 9000).toString();
    localStorage.setItem('volt_master_uid', userID);

            function updateHijriDate() {
    const months = [
        "Мухаррам", "Сафар", "Раби аль-авваль", "Раби ас-сани",
        "Джумада аль-уля", "Джумада ас-сани", "Раджаб", "Шабан",
        "Рамадан", "Шавваль", "Зу-ль-када", "Зу-ль-хиджа"
    ];

    const today = new Date();
    const currentHour = today.getHours();
    
    // Если время больше 18:00, считаем, что наступил следующий день по Хиджре
    let adjustment = (currentHour >= 18) ? 2 : 1; 
    
    let day = today.getDate();
    let month = today.getMonth();
    let year = today.getFullYear();
    
    let m = month + 1;
    let y = year;
    if (m < 3) { y -= 1; m += 12; }

    let jd = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + day + (2 - Math.floor(y / 100) + Math.floor(Math.floor(y / 100) / 4)) - 1524.5;
    
    jd += adjustment;
    
    let i = Math.floor(jd - 1948440 + 10632);
    let n = Math.floor((i - 1) / 10631);
    i = i - 10631 * n + 354;
    let z = (Math.floor((10985 - i) / 5316)) * (Math.floor((50 * i) / 17719)) + (Math.floor(i / 5670)) * (Math.floor((43 * i) / 15313));
    i = i - (Math.floor((30 - z) / 15)) * (Math.floor((17719 * z) / 50)) - (Math.floor(z / 16)) * (Math.floor((15313 * z) / 43)) + 29;
    
    let m_hijri = Math.floor((24 * i) / 709);
    let d_hijri = i - Math.floor((709 * m_hijri) / 24);
    let y_hijri = 30 * n + z - 30;

    const result = `🌙 ${d_hijri} ${months[m_hijri-1]} ${y_hijri} г.х.`;
    document.getElementById('hijri-date').innerHTML = result;
}

// Запускаем проверку каждую минуту, чтобы дата сменилась ровно в 18:00 или в 00:00
setInterval(updateHijriDate, 60000); 
            
            function initApp() {
        updateHijriDate();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=10').then(() => console.log("VoltMaster V10 OK"));
        }

        // --- ЭТОТ БЛОК ОТВЕЧАЕТ ЗА ПОЛУЧЕНИЕ ОБЪЯВЛЕНИЙ ---
        database.ref('global_message').on('value', snap => {
            const msg = snap.val();
            // Проверяем, есть ли сообщение и не читали ли мы его уже
            if(msg && localStorage.getItem('last_msg_read') !== msg) {
                document.getElementById('modal-msg-text').innerText = msg;
                document.getElementById('global-modal').style.display = 'flex';
                
                // Автоматическое сохранение в память браузера (как ты просил)
                localStorage.setItem('volt_cached_msg', msg); 
            } else { 
                document.getElementById('global-modal').style.display = 'none'; 
            }
        });

        // Остальной код (счетчик ID)
        const now = new Date();
        const dateKey = now.toISOString().split('T')[0];
        const timeStr = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'});
        const visitRef = database.ref(`visits/${dateKey}/ID-${userID}`);
        
        visitRef.once('value', snap => {
            const d = snap.val() || { count: 0, allTimes: "" };
            visitRef.update({
                id: userID,
                count: d.count + 1,
                lastTime: timeStr,
                allTimes: d.allTimes ? d.allTimes + ", " + timeStr : timeStr,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        });

                // Обновленный счетчик и регистрация
        database.ref('registered_users/' + userID).set({ last_active: Date.now() });

        database.ref('registered_users').on('value', snap => {
            const total = snap.numChildren();
            document.getElementById('stats-display').innerText = `ID: ${userID} | ВСЕГО: ${total}`;
            localStorage.setItem('volt_total_users', total);
        });

        watchShabashki();
}
    function closeGlobalModal() {
        localStorage.setItem('last_msg_read', document.getElementById('modal-msg-text').innerText);
        document.getElementById('global-modal').style.display = 'none';
    }

    // top
    function sendGlobalMsg() {
        const text = document.getElementById('new-global-msg').value;
        if(text) database.ref('global_message').set(text).then(() => alert("Объявление отправлено!"));
    }

    function deleteGlobalMsg() {
        if(confirm("Удалить объявление?")) database.ref('global_message').remove();
    }

    function loadLogs() {
        database.ref('visits').on('value', snap => {
            const data = snap.val() || {};
            let html = `
                <div class="top-stats-big">панель</div>
                <div class="top-input-box">
                    <div style="color:var(--main-gold); font-size:11px; margin-bottom:8px; font-weight:bold;">ОБЪЯВЛЕНИЕ ПЕРЕД ЭКРАНОМ:</div>
                    <textarea id="new-global-msg" rows="3" placeholder="Текст для всех..."></textarea>
                    <button class="top-nav-btn" style="margin:0; width:100%;" onclick="sendGlobalMsg()">📢 ЗАБЛОКИРОВАТЬ ЭКРАНЫ</button>
                    <button class="top-nav-btn" style="margin:10px 0 0; width:100%; color:#ff4444; border-color:#500;" onclick="deleteGlobalMsg()">❌ УДАЛИТЬ У ВСЕХ</button>
                </div>
                <div class="top-nav-btn" onclick="closetop(); openApp('Управление', 'volt.html')">🛠 УПРАВЛЕНИЕ ШАБАШКАМИ</div>
            `;
            
            Object.keys(data).sort().reverse().forEach(date => {
                html += `<div class="date-divider">--- ${date} --- (${Object.keys(data[date]).length})</div>`;
                Object.values(data[date]).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)).forEach(v => {
                    html += `
                        <div class="log-item">
                            <div style="display:flex;justify-content:space-between;align-items:baseline;">
                                <div><span style="font-weight:bold;">ID: ${v.id}</span> <span style="color:var(--main-gold);font-size:12px;">x${v.count}</span></div>
                                <span style="color:var(--main-gold);font-size:14px;font-weight:bold;">${v.lastTime}</span>
                            </div>
                            <div class="log-history">${v.allTimes || '---'}</div>
                        </div>`;
                });
            });
            html += `<button class="top-nav-btn" style="background:#ff4444; color:#fff; border:none; margin-top:20px;" onclick="if(confirm('Стереть историю?')) database.ref('visits').remove()">ОЧИСТИТЬ ЛОГИ</button>`;
            document.getElementById('top-content').innerHTML = html;
        });
    }

    // ОСТАЛЬНОЕ
    function initNotifications(event) {
    const btn = event.currentTarget; // Получаем саму кнопку
    const messaging = firebase.messaging();
    const isSubscribed = localStorage.getItem('notifications_active') === 'true';

    if (isSubscribed) {
        // Если уже подписан — УДАЛЯЕМ
        database.ref('fcm_tokens/' + userID).remove().then(() => {
            localStorage.setItem('notifications_active', 'false');
            btn.innerText = "🔔 Включить"; // Меняем текст на кнопке
            alert("🔕 Уведомления отключены");
        });
    } else {
        Notification.requestPermission().then((perm) => {
            if (perm === 'granted') {
                navigator.serviceWorker.ready.then((reg) => {
                    messaging.getToken({ 
                        serviceWorkerRegistration: reg, 
                        vapidKey: 'BGNQzIvGew0uQqFsOOLYdy8FATmZ_vX1Y6xWgqn7uggV_vTSaD3bGL7VOVD5Xllad74NgOYKkYekWNL-3tgN_cQ' 
                    })
                    .then((tok) => { 
                        if (tok) {
                            database.ref('fcm_tokens/' + userID).set(tok);
                            localStorage.setItem('notifications_active', 'true');
                            alert("🔔 Уведомления включены!");
                        }
                    });
                });
            }
        });
    }
}


    function openApp(name, url) {
        document.getElementById('overlay-title').innerText = name.toUpperCase();
        document.getElementById('app-frame').src = url + "?v=" + Date.now();
        document.getElementById('app-overlay').style.display = 'flex';
    }

    function closeApp() { document.getElementById('app-overlay').style.display = 'none'; document.getElementById('app-frame').src = ''; }

    function watchShabashki() {
        database.ref('shabashki/active').on('value', snap => {
            const count = Object.keys(snap.val() || {}).length;
            const lastSeen = parseInt(localStorage.getItem('shabash_seen') || 0);
            const badge = document.getElementById('shabash-count');
            if (count > lastSeen) { badge.innerText = "+" + (count - lastSeen); badge.style.display = 'inline-block'; } 
            else badge.style.display = 'none';
        });
    }

    function handleShabashkiClick() {
        database.ref('shabashki/active').once('value', snap => {
            localStorage.setItem('shabash_seen', Object.keys(snap.val() || {}).length);
            document.getElementById('shabash-count').style.display = 'none';
            openApp('Шабашки', 'shabashki.html');
        });
    }

    let stageOne = false, s1C = 0, s2C = 0, sTimer;

document.getElementById('hijri-date').onclick = () => {
    s1C++;
    clearTimeout(sTimer);
    sTimer = setTimeout(() => { s1C = 0; stageOne = false; }, 1000);
    if (s1C === 3) stageOne = true;
};

document.getElementById('main-logo').onclick = () => {
    if (!stageOne) return;
    s2C++;
    if (s2C === 3) {
        if (prompt("...") === "Gazik0303") {
            document.getElementById('top-overlay').style.display = 'flex';
            loadLogs();
        }
        s1C = 0; s2C = 0; stageOne = false;
    }
    setTimeout(() => s2C = 0, 1000);
};

    function closetop() { document.getElementById('top-overlay').style.display = 'none'; }

    window.onload = initApp;
