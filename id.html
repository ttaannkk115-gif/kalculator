<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLTMASTER ADMIN - ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc107; --bg: #0a0a0a; --card: #161616; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 380px; background: var(--card); padding: 30px 20px; border-radius: 28px; border: 1px solid rgba(255, 193, 7, 0.2); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        h2 { color: var(--gold); margin-bottom: 5px; text-transform: uppercase; }
        p { color: #666; font-size: 11px; margin-bottom: 25px; }
        input { width: 100%; padding: 16px; background: #222; border: 1px solid #333; border-radius: 15px; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; font-size: 16px; }
        input:focus { border-color: var(--gold); }
        .btn { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #log { margin-top: 20px; background: black; border-radius: 15px; padding: 15px; font-family: monospace; font-size: 11px; text-align: left; height: 160px; overflow-y: auto; border: 1px solid #222; color: #0f0; }
        .log-warn { color: var(--gold); }
        .log-info { color: #2196f3; }
    </style>
</head>
<body>

<div class="container">
    <h2>VOLTMASTER</h2>
    <p>Глобальная ротация ID и принудительная синхронизация</p>
    
    <input type="number" id="old-id" placeholder="Старый ID (кого меняем)" inputmode="numeric">
    <input type="number" id="new-id" placeholder="Новый ID (целевой)" inputmode="numeric">
    
    <button class="btn" onclick="executeFullRotation()">ЗАМЕНИТЬ И ОБНОВИТЬ ВСЕХ</button>
    
    <div id="log">> Готов к работе...</div>
</div>

<script>
    // Твой конфиг Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyD-dIC8bm8y4kaY7RXmMrys2wOMLA5o8vY",
        authDomain: "voltmaster-332c0.firebaseapp.com",
        databaseURL: "https://voltmaster-332c0-default-rtdb.firebaseio.com",
        projectId: "voltmaster-332c0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addLog(msg, cl = '') {
        const box = document.getElementById('log');
        const div = document.createElement('div');
        if(cl) div.className = cl;
        div.innerHTML = `> ${msg}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function executeFullRotation() {
        const oldID = document.getElementById('old-id').value.trim();
        const newID = document.getElementById('new-id').value.trim();
        if(!oldID || !newID) return alert("Введите оба ID!");

        document.getElementById('log').innerHTML = "";
        addLog("🔍 Анализ базы данных...");

        try {
            const activeSnap = await db.ref('shabashki/active').once('value');
            const archiveSnap = await db.ref('shabashki/archive').once('value');
            const active = activeSnap.val() || {};
            const archive = archiveSnap.val() || {};

            // 1. ПРОВЕРКА РОТАЦИИ (есть ли кто-то на новом ID?)
            let isBusy = false;
            for(let k in active) if(active[k].ownerID == newID || active[k].workerID == newID) isBusy = true;
            for(let k in archive) if(archive[k].ownerID == newID || archive[k].finisherID == newID) isBusy = true;

            if(isBusy) {
                const randID = Math.floor(1000 + Math.random() * 8999).toString();
                addLog(`⚠️ ID ${newID} занят! Смещаю владельца на ${randID}`, "log-warn");
                
                // Переносим данные "жильца" на случайный ID в базе
                await performSwap(newID, randID, active, archive);
                
                // Шлем сигнал на телефон "выселенного" пользователя
                await db.ref(`system_updates/${newID}`).set({
                    action: "CHANGE_LOCAL_ID",
                    newID: randID,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }

            // 2. ОСНОВНОЙ ПЕРЕНОС (твой старый ID на новый)
            addLog(`🚀 Перенос ${oldID} -> ${newID}...`);
            await performSwap(oldID, newID, active, archive);

            // Сигнал на твой телефон
            await db.ref(`system_updates/${oldID}`).set({
                action: "CHANGE_LOCAL_ID",
                newID: newID,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            addLog("✨ ВСЕ ПОЛЬЗОВАТЕЛИ СИНХРОНИЗИРОВАНЫ!", "log-info");
            alert("Готово! Команды на обновление отправлены обоим пользователям.");

        } catch (e) {
            addLog("❌ ОШИБКА: " + e.message, "log-warn");
        }
    }

    async function performSwap(f, t, active, archive) {
        const from = String(f);
        const to = String(t);

        // Активные
        for (let key in active) {
            let order = active[key];
            let upds = {};
            if (String(order.ownerID) === from) upds.ownerID = to;
            if (String(order.workerID) === from) upds.workerID = to;
            
            if (order.rejections) {
                for (let rK in order.rejections) {
                    let txt = order.rejections[rK].text;
                    if (txt.includes(`ID-${from}`)) upds[`rejections/${rK}/text`] = txt.replace(`ID-${from}`, `ID-${to}`);
                }
            }
            if (Object.keys(upds).length > 0) await db.ref(`shabashki/active/${key}`).update(upds);
        }

        // Архив
        for (let key in archive) {
            let item = archive[key];
            let upds = {};
            if (String(item.ownerID) === from) upds.ownerID = to;
            if (String(item.finisherID) === from) upds.finisherID = to;
            if (Object.keys(upds).length > 0) await db.ref(`shabashki/archive/${key}`).update(upds);
        }
        addLog(`✅ Данные в базе обновлены для ${from}`);
    }
</script>
</body>
</html>
