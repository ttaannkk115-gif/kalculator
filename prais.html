<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Смета Электрика 2026</title>
    <style>
                :root { --primary: #1a73e8; --success: #2db855; --danger: #e53935; --dark: #202124; --bg: #f1f3f4; }
        
        /* ЖЕСТКИЙ ЗАПРЕТ СДВИГА ВПРАВО-ВЛЕВО */
        html, body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding-bottom: 140px; 
            color: var(--dark);
            width: 100%;
            max-width: 100%;
            overflow-x: hidden; /* Это главный замок */
            position: relative;
            touch-action: pan-y; /* Разрешает только скролл вверх-вниз */
        }
        
        /* Чтобы отступы не распирали блоки */
        * { box-sizing: border-box; }

        .container { 
            padding: 15px; 
            width: 100%; 
            max-width: 100vw; 
            margin: auto; 
            background: white; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* Шапка и Поиск */
        .header { position: sticky; top: 0; background: var(--primary); color: white; padding: 12px 15px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .search-container { position: relative; width: 100%; }
        .search-box { width: 100%; padding: 12px 40px 12px 12px; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; outline: none; }
        .clear-search { 
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: #bdc3c7; color: white; border: none; border-radius: 50%;
            width: 24px; height: 24px; cursor: pointer; display: none;
            align-items: center; justify-content: center; font-size: 14px;
        }

        .container { padding: 15px; max-width: 900px; margin: auto; background: white; min-height: 100vh; }
        
        /* Инфо-блок */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        .info-input { border: none; border-bottom: 1px solid #eee; padding: 4px 0; font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        .info-label { font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase; }

        /* Каталог */
        .section-box { border: 1px solid #ddd; margin-bottom: 5px; border-radius: 5px; overflow: hidden; }
        .section-header { padding: 12px; background: #f8f9fa; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-top: 1px solid #eee; }
        .catalog-qty { width: 50px; border: 2px solid var(--primary); color: var(--primary); text-align: center; border-radius: 6px; font-weight: bold; padding: 5px; margin-right: 8px; outline: none; font-size: 14px; }

        /* Таблица сметы */
                .estimate-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            table-layout: fixed; /* Фиксирует колонки, чтобы не тянули экран */
        }

        .estimate-table th, .estimate-table td { border: 1px solid #ccc; padding: 8px; font-size: 14px; text-align: left; }
        .qty-inp { width: 60px; border: 1px solid #ddd; text-align: center; font-weight: bold; padding: 6px; border-radius: 4px; font-size: 16px; }

        /* Футер */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1001; }
        .total-amount { font-size: 24px; color: #ffeb3b; font-weight: 900; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: inherit; }

        /* Модалки */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center; }
                .modal-content { 
            background:white; 
            padding:20px; 
            border-radius:12px; 
            width: 94% !important; /* Чтобы не вылезало за края экрана */
            max-width:400px; 
            color: #000; 
        }

        @media print { .no-print { display: none !important; } .container { width: 100%; padding: 0; } }
    /* --- НОВЫЕ СТИЛИ ДЛЯ БЫСТРОГО ОКНА --- */
.quick-row { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
.quick-info { flex: 1; padding-right: 10px; }
.quick-controls { display: flex; align-items: center; gap: 8px; }
.btn-qty { width: 35px; height: 35px; border-radius: 8px; border: 1px solid #ccc; background: #fff; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-qty:active { background: #eee; }

.btn-coeff { 
    margin-top: 8px; padding: 5px 10px; border-radius: 6px; border: 1px solid #ddd; 
    font-size: 11px; font-weight: bold; cursor: pointer; background: #f8f9fa; transition: 0.2s;
}
.btn-coeff.active { background: #e53935; color: white; border-color: #b71c1c; box-shadow: 0 2px 4px rgba(229,57,53,0.3); }

/* Обновленное окно детализации с прокруткой */
#modal-view-smeta .modal-content { 
    max-width: 500px; 
    width: 94%; 
    max-height: 85vh;       /* Ограничиваем высоту окна до 85% экрана */
    display: flex; 
    flex-direction: column; 
    overflow: hidden;       /* Прячем лишнее, что выходит за рамки */
}

/* Этот блок отвечает за то, чтобы список внутри можно было листать */
#quick-view-content { 
    flex: 1;               /* Занимает всё свободное место */
    overflow-y: auto;      /* ВКЛЮЧАЕТ ПРОКРУТКУ (скролл) по вертикали */
    padding-right: 5px;    /* Место для полосы прокрутки */
    -webkit-overflow-scrolling: touch; /* Плавный скролл на iPhone */
}

    </style>

<div class="header no-print">
    <div class="nav-row">
        <span style="font-weight: bold;">СМЕТА 2026</span>
        <div style="display: flex; gap: 8px;">
            <button class="btn" style="background:#673ab7; color:white;" onclick="toggleModal('modal-archive')">Архив</button>
            <button class="btn" style="background:rgba(255,255,255,0.2); color:white;" onclick="toggleModal('modal-custom')">📦+</button>
            <button class="btn" style="background:var(--danger); color:white;" onclick="resetSmeta()">СБРОС</button>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="Поиск..." oninput="handleSearch(this.value)">
        <button id="clear-btn" class="clear-search" onclick="clearSearch()">✕</button>
    </div>
</div>

<div class="container">
    <div id="catalog" class="no-print" style="margin-bottom: 20px;"></div>

    <div class="info-grid">
        <div>
            <div class="info-label">Заказчик</div>
            <input type="text" id="inp-client" class="info-input" placeholder="Имя">
            <div class="info-label" style="margin-top:10px">Адрес</div>
            <input type="text" id="inp-address" class="info-input" placeholder="Объект">
        </div>
        <div style="text-align: right;">
            <div class="info-label">Дата</div>
            <div style="font-size: 18px; font-weight: bold; padding: 4px 0;">02.03.2026</div>
            <div class="info-label" style="margin-top:10px">Мастер</div>
            <input type="text" id="inp-master" class="info-input" style="text-align: right;" value="Master">
        </div>
    </div>

    <div id="estimate"></div>
    <div style="text-align:right; font-weight:bold; margin-top:20px; font-size:22px;">ИТОГО: <span id="total-bottom">0</span> ₽</div>
</div>

<div class="footer no-print">
    <div class="total-amount" onclick="showQuickSmeta()" style="cursor:pointer; border-radius: 8px; padding: 5px;">
    <span id="total">0</span> ₽ <span style="font-size: 14px; opacity: 0.6; margin-left: 5px;">📋</span>
</div>

    <div style="display: flex; gap: 10px;">
        <button class="btn" style="background:var(--success); color:white; padding:12px 15px;" onclick="saveToArchive()">СОХРАНИТЬ</button>
        <button class="btn" style="background:#fff; color:#000; padding:12px 15px;" onclick="window.print()">ПЕЧАТЬ</button>
    </div>
</div>

<div id="modal-custom" class="modal" onclick="toggleModal('modal-custom')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h4>Своя работа 📦</h4>
        <input type="text" id="c-name" class="info-input" style="border:1px solid #ddd; margin-bottom:10px; padding:8px;" placeholder="Название">
        <input type="number" id="c-price" class="info-input" style="border:1px solid #ddd; margin-bottom:15px; padding:8px;" placeholder="Цена">
        <button class="btn" style="width:100%; background:var(--success); color:white; padding:12px;" onclick="addOneTimeItem()">ДОБАВИТЬ</button>
    </div>
</div>

<div id="modal-archive" class="modal" onclick="toggleModal('modal-archive')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h4>Архив смет 📁</h4>
            <button onclick="toggleModal('modal-archive')" style="border:none; background:none; font-size:22px;">✕</button>
        </div>
        <div id="archive-list" style="max-height: 350px; overflow-y: auto; margin-top:10px; border-top:1px solid #eee;"></div>
    </div>
</div>

<div id="modal-view-smeta" class="modal" onclick="toggleModal('modal-view-smeta')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
            <h3 style="margin:0; color:var(--dark);">Детализация работ</h3>
            <button onclick="toggleModal('modal-view-smeta')" style="border:none; background:none; font-size:28px; cursor:pointer;">&times;</button>
        </div>
        <div id="quick-view-content"></div>
        <button class="btn" style="width:100%; margin-top:15px; background:var(--dark); color:white; padding: 12px;" onclick="toggleModal('modal-view-smeta')">Вернуться к каталогу</button>
    </div>
</div>

        {id:"32.6", n:"Выезд Инженера (консультация)", p:1000, u:"шт"}
    ]},
    
    { cat: "33.прочие", items: [
        {id:"33.1", n:"точка", p:500, u:"шт"},
        {id:"33.2", n:"Подключение 1ф (на лестнице)", p:3500, u:"шт"},
        {id:"33.3", n:"Подключение 3ф (на лестнице)", p:4000, u:"шт"},
    ]},
];

let state = JSON.parse(localStorage.getItem('smeta_current')) || [];
let archive = JSON.parse(localStorage.getItem('smeta_archive')) || [];
let openSections = {}; // Всегда пусто при загрузке (разделы закрыты)

// ПОИСК
function handleSearch(val) {
    document.getElementById('clear-btn').style.display = val.length > 0 ? 'flex' : 'none';
    renderCatalog(val);
}

function clearSearch() {
    const inp = document.getElementById('search');
    inp.value = "";
    inp.focus();
    handleSearch("");
}

// КАТАЛОГ
function renderCatalog(filter = "") {
    const list = document.getElementById('catalog');
    list.innerHTML = "";
    const f = filter.toLowerCase().replace(/ё/g, 'е');
    
    db.forEach(sec => {
        const items = sec.items.filter(i => i.n.toLowerCase().replace(/ё/g, 'е').includes(f));
        if (!items.length) return;
        
        const isVisible = openSections[sec.cat] || (f.length > 0);
        const box = document.createElement('div');
        box.className = 'section-box';
        
        let itemsHtml = items.map(i => {
            const currentItem = state.find(s => s.id === i.id && !s.k25);
            const count = currentItem ? currentItem.qty : 0;
            return `
                <div class="item-row">
                    <div>${i.n}<br><small>${i.p} ₽ / ${i.u}</small></div>
                    <div style="display:flex; align-items:center;">
                        <input type="number" class="catalog-qty" value="${count || ''}" placeholder="0" 
                               onchange="manualUpdate('${i.id}', this.value)" onclick="event.stopPropagation()">
                        <button class="btn" style="background:var(--success); color:white;" onclick="addItem('${i.id}')">+</button>
                    </div>
                </div>`;
        }).join('');

        box.innerHTML = `
            <div class="section-header" onclick="toggleSec('${sec.cat}')">
                ${sec.cat} <span>${isVisible ? '▲' : '▼'}</span>
            </div>
            <div class="section-content" style="display:${isVisible ? 'block' : 'none'}">${itemsHtml}</div>`;
        list.appendChild(box);
    });
}

function toggleSec(cat) {
    openSections[cat] = !openSections[cat];
    renderCatalog(document.getElementById('search').value);
}

// ЛОГИКА ДОБАВЛЕНИЯ
function addItem(id) {
    let baseItem = null;
    db.forEach(s => s.items.forEach(i => { if(i.id === id) baseItem = i; }));
    const existing = state.find(s => s.id === id && !s.k25);
    if (existing) { existing.qty += 1; } 
    else { state.push({...baseItem, qty: 1, k25: false}); }
    sync();
}

function manualUpdate(id, val) {
    const num = parseFloat(val) || 0;
    const existingIndex = state.findIndex(s => s.id === id && !s.k25);
    if (existingIndex !== -1) {
        if (num <= 0) state.splice(existingIndex, 1);
        else state[existingIndex].qty = num;
    } else if (num > 0) {
        let baseItem = null;
        db.forEach(s => s.items.forEach(i => { if(i.id === id) baseItem = i; }));
        if(baseItem) state.push({...baseItem, qty: num, k25: false});
    }
    sync();
}

// СИНХРОНИЗАЦИЯ И ПАМЯТЬ
function sync() {
    localStorage.setItem('smeta_current', JSON.stringify(state));
    const container = document.getElementById('estimate');
    let total = 0;

    if(!state.length) {
        container.innerHTML = "<p style='text-align:center; color:#999; padding:20px;'>Смета пуста</p>";
    } else {
        let html = `<table class="estimate-table">
            <thead>
                <tr>
                    <th>№</th>
                    <th>Работа</th>
                    <th>Кол-во</th>
                    <th>Цена</th>
                    <th>Сумма</th>
                    <th class="no-print"></th>
                </tr>
            </thead>
            <tbody>`;
            
        state.forEach((item, i) => {
            const p = item.k25 ? Math.round(item.p * 2.5) : item.p;
            const s = p * item.qty;
            total += s;
            html += `<tr>
                <td>${i+1}</td>
                <td style="font-size:12px;">${item.n}${item.k25 ? '<br><small style="color:red">x2.5</small>' : ''}</td>
                <td>
                    <input type="number" class="qty-inp" value="${item.qty}" onchange="updateQty(${i}, this.value)">
                    <div style="font-size:10px; color:#999;">${item.u}</div>
                </td>
                <td style="white-space:nowrap;">${p} ₽</td>
                <td style="font-weight:bold; white-space:nowrap;">${s.toLocaleString()} ₽</td>
                <td class="no-print">
                    <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
                        <input type="checkbox" ${item.k25 ? 'checked' : ''} onchange="toggleK(${i})">
                        <button style="color:red; border:none; background:none; font-size:18px;" onclick="remove(${i})">✕</button>
                    </div>
                </td>
            </tr>`;
        });
        container.innerHTML = html + `</tbody></table>`;
    }
    
    const formattedTotal = total.toLocaleString();
    document.getElementById('total').innerText = formattedTotal;
    document.getElementById('total-bottom').innerText = formattedTotal;
    renderCatalog(document.getElementById('search').value);
}

function updateQty(i, v) { state[i].qty = parseFloat(v) || 0; sync(); }
function remove(i) { state.splice(i, 1); sync(); }
function toggleK(i) { state[i].k25 = !state[i].k25; sync(); }
function resetSmeta() { if(confirm("Очистить?")) { state = []; sync(); } }

// АРХИВ
function saveToArchive() {
    if(!state.length) return;
    const client = document.getElementById('inp-client').value || 'Без имени';
    archive.unshift({id: Date.now(), client, total: document.getElementById('total').innerText, date: new Date().toLocaleString(), data: JSON.parse(JSON.stringify(state))});
    localStorage.setItem('smeta_archive', JSON.stringify(archive));
    alert("Сохранено в архив!");
}

function renderArchive() {
    const list = document.getElementById('archive-list');
    list.innerHTML = archive.length ? "" : "<p style='padding:10px;'>Архив пуст</p>";
    archive.forEach(a => {
        list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee;">
            <div onclick="loadArchive(${a.id})" style="cursor:pointer"><b>${a.client}</b><br><small>${a.date} — ${a.total} ₽</small></div>
            <button onclick="delArch(${a.id})" style="color:red; border:none; background:none; font-size:18px;">🗑️</button>
        </div>`;
    });
}

function loadArchive(id) {
    const entry = archive.find(x => x.id === id);
    if(confirm(`Загрузить смету для ${entry.client}?`)) {
        state = JSON.parse(JSON.stringify(entry.data));
        document.getElementById('inp-client').value = entry.client;
        sync();
        toggleModal('modal-archive');
    }
}

function delArch(id) {
    if(confirm("Удалить?")) {
        archive = archive.filter(x => x.id !== id);
        localStorage.setItem('smeta_archive', JSON.stringify(archive));
        renderArchive();
    }
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    if(id === 'modal-archive') renderArchive();
}

function addOneTimeItem() {
    const n = document.getElementById('c-name').value;
    const p = parseFloat(document.getElementById('c-price').value);
    if(n && p) { state.push({id: Date.now(), n, p, qty: 1, k25: false, u: 'шт'}); sync(); toggleModal('modal-custom'); }
}

// АВТОЗАПОЛНЕНИЕ ПОЛЕЙ ПРИ СТАРТЕ
['inp-client', 'inp-address', 'inp-master'].forEach(id => {
    const el = document.getElementById(id);
    el.value = localStorage.getItem('val_'+id) || el.value;
    el.oninput = () => localStorage.setItem('val_'+id, el.value);
});

renderCatalog();
sync();
// Функция отображения и управления быстрой сметой
function showQuickSmeta() {
    const modal = document.getElementById('modal-view-smeta');
    const content = document.getElementById('quick-view-content');
    
    if (state.length === 0) {
        content.innerHTML = "<div style='text-align:center; padding:30px; color:#999;'>Смета пуста. Добавьте работы из каталога!</div>";
        if (modal.style.display !== 'flex') toggleModal('modal-view-smeta');
        return;
    }

    let html = `<div style="overflow-y: auto; flex: 1; padding-right:5px;">`;
    
    state.forEach((item, i) => {
        const p = item.k25 ? Math.round(item.p * 2.5) : item.p;
        html += `
            <div class="quick-row">
                <div class="quick-info">
                    <div style="font-size:15px; font-weight:bold;">${item.n}</div>
                    <div style="font-size:13px; color:#666;">${p} ₽ × ${item.qty} ${item.u}</div>
                    <button class="btn-coeff ${item.k25 ? 'active' : ''}" 
                            onclick="toggleK(${i}); showQuickSmeta();">
                        ${item.k25 ? '🔥 Коэфф. x2.5 ВКЛ' : 'Применить x2.5'}
                    </button>
                </div>
                <div class="quick-controls">
                    <button class="btn-qty" onclick="if(state[${i}].qty > 1) { updateQty(${i}, state[${i}].qty - 1); } else { if(confirm('Удалить?')) remove(${i}); } showQuickSmeta();">−</button>
                    
                    <b style="min-width:35px; text-align:center; font-size:18px;">${item.qty}</b>
                    
                    <button class="btn-qty" onclick="updateQty(${i}, state[${i}].qty + 1); showQuickSmeta();">+</button>
                    
                    <button style="border:none; background:none; font-size:22px; margin-left:10px; cursor:pointer;" 
                            onclick="if(confirm('Удалить позицию?')) { remove(${i}); showQuickSmeta(); }">🗑️</button>
                </div>
            </div>`;
    });
    
    html += `</div>`;
    
    const currentTotal = document.getElementById('total').innerText;
    html += `
        <div style="margin-top:15px; padding-top:15px; border-top:3px solid var(--dark); display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:16px;">ИТОГО:</b>
            <b style="font-size:24px; color:var(--primary);">${currentTotal} ₽</b>
        </div>`;
             
    content.innerHTML = html;
    
    if (modal.style.display !== 'flex') toggleModal('modal-view-smeta');
}

</script>
</body>
</html>
