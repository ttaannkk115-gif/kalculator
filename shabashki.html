<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT MASTER - CLOUD ШАБАШКИ</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root {
            --main-gold: #ffc107;
            --dark-bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --text-dim: #999999;
            --success: #4caf50;
            --process: #2196f3;
            --danger: #ff4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; background: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%);
            color: var(--text-main); padding-bottom: 120px; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        header { padding: 20px 20px 10px; text-align: center; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin: 0; }
        .logo span { color: var(--main-gold); }
        
        .user-id-badge {
            display: inline-block; background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3); color: var(--main-gold);
            padding: 4px 12px; border-radius: 12px; font-size: 11px; margin-top: 8px; font-family: monospace;
        }

        .city-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px 20px; scrollbar-width: none; }
        .city-tabs::-webkit-scrollbar { display: none; }
        .tab { background: rgba(255,255,255,0.05); border: 1px solid #333; color: #888; padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: bold; white-space: nowrap; }
        .tab.active { background: var(--main-gold); color: #000; border-color: var(--main-gold); }

        .card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 18px; padding: 18px; margin: 0 15px 12px; }
        .card-header { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; }
        .tag-city { color: var(--main-gold); font-weight: bold; }
        
        .badge-status { font-size: 9px; padding: 4px 8px; border-radius: 6px; font-weight: bold; display: inline-block; margin-bottom: 10px; text-transform: uppercase; }
        .bg-free { background: rgba(255,255,255,0.1); color: #fff; }
        .bg-busy { background: rgba(33, 150, 243, 0.2); color: var(--process); }

        .rej-box { background: rgba(255, 68, 68, 0.05); border: 1px dashed rgba(255, 68, 68, 0.3); border-radius: 10px; padding: 10px; margin-bottom: 10px; font-size: 11px; }

        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 13px; margin-top: 5px; transition: 0.3s; }
        .btn-main { background: var(--main-gold); color: #000; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-disabled { background: #333 !important; color: #666 !important; cursor: not-allowed; }
        .btn-outline { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #333; }
        .btn-small { padding: 8px; font-size: 9px; background: #222; color: #777; border-radius: 8px; flex: 1; border: none; }

        nav { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; padding: 15px 0 25px; z-index: 1000; }
        nav button { background: none; border: none; color: #555; font-size: 10px; font-weight: bold; display: flex; flex-direction: column; align-items: center; flex: 1; gap: 5px; }
        nav button.active { color: var(--main-gold); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal { background: #161616; padding: 25px; border-radius: 20px; width: 85%; border: 1px solid #333; }
        
        .hidden { display: none; }
        input, select, textarea { background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 12px; padding: 14px; color: #fff; width: 100%; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">VOLT<span>MASTER</span></div>
    <div class="user-id-badge">ID: <span id="display-id">0000</span></div>
</header>

<div class="city-tabs" id="city-tabs-ui">
    <div class="tab active" onclick="setFilter('Все', this)">ОБЩИЙ</div>
    <div class="tab" onclick="setFilter('Махачкала', this)">МАХАЧКАЛА</div>
    <div class="tab" onclick="setFilter('Каспийск', this)">КАСПИЙСК</div>
    <div class="tab" onclick="setFilter('Буйнакск', this)">БУЙНАКСК</div>
</div>

<div id="view-list"><div id="orders-list"></div></div>
<div id="view-archive" class="hidden"><div id="archive-list"></div></div>

<div id="view-add" class="hidden" style="padding: 20px;">
    <input type="hidden" id="edit-id">
    <select id="city-input">
        <option value="Махачкала">Махачкала</option>
        <option value="Каспийск">Каспийск</option>
        <option value="Буйнакск">Буйнакск</option>
    </select>
    <input type="text" id="task" placeholder="Что нужно сделать?">
    <input type="text" id="address" placeholder="Адрес (улица, дом)">
    <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
    <button class="btn btn-main" onclick="saveOrder()" id="save-btn">ОПУБЛИКОВАТЬ</button>
</div>

<div id="modal-rej" class="modal-overlay">
    <div class="modal">
        <h3 style="color:var(--main-gold)">Причина отказа</h3>
        <textarea id="rej-text" rows="4" placeholder="Укажите причину..."></textarea>
        <button class="btn btn-main" onclick="submitRejection()">ОТПРАВИТЬ</button>
        <button class="btn btn-outline" onclick="closeModal()">ОТМЕНА</button>
    </div>
</div>

<nav>
    <button onclick="changeView('list', this)" class="active"><i>📋</i>ЗАКАЗЫ</button>
    <button onclick="changeView('add', this)"><i>➕</i>СОЗДАТЬ</button>
    <button onclick="changeView('archive', this)"><i>📁</i>АРХИВ</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-dIC8bm8y4kaY7RXmMrys2wOMLA5o8vY",
        authDomain: "voltmaster-332c0.firebaseapp.com",
        databaseURL: "https://voltmaster-332c0-default-rtdb.firebaseio.com",
        projectId: "voltmaster-332c0",
        storageBucket: "voltmaster-332c0.firebasestorage.app",
        messagingSenderId: "312337098429",
        appId: "1:312337098429:web:663e0f6787bd62d19bf9d4",
        measurementId: "G-C8LKVE96DW"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userID = localStorage.getItem('volt_master_uid');
    if (!userID) {
        userID = Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('volt_master_uid', userID);
    }
    document.getElementById('display-id').innerText = userID;

    let currentFilter = 'Все', allOrders = [], currentRejId = null;

    document.getElementById('phone').addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
        if (!x[2]) e.target.value = x[1] ? '+7 (' : '';
        else e.target.value = '+7 (' + x[2] + (x[3] ? ') ' + x[3] : '') + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
    });

    function initSync() {
        db.ref('shabashki/active').on('value', snap => {
            allOrders = Object.values(snap.val() || {}).sort((a,b) => b.timestamp - a.timestamp);
            renderFiltered();
        });
        db.ref('shabashki/archive').limitToLast(20).on('value', snap => {
            renderArchive(Object.values(snap.val() || {}).sort((a,b) => b.timestamp - a.timestamp));
        });
        setInterval(updateTimers, 1000);
    }

    function renderFiltered() {
        const container = document.getElementById('orders-list');
        const filtered = currentFilter === 'Все' ? allOrders : allOrders.filter(o => o.city === currentFilter);
        container.innerHTML = filtered.length ? '' : '<div style="text-align:center;padding:50px;color:#444">Нет активных заказов</div>';
        
        filtered.forEach(o => {
            const isBusy = o.status === 'busy';
            let rejectionsHtml = o.rejections ? 
                `<div class="rej-box">${Object.values(o.rejections).map(r => `• ${r.text}`).join('<br>')}</div>` : '';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header"><span class="tag-city">${o.city}</span><span style="color:#555">${o.date}</span></div>
                <span class="badge-status ${isBusy ? 'bg-busy' : 'bg-free'}">${isBusy ? '⏳ В работе' : '🔘 Свободен'}</span>
                <h3>${o.task}</h3><div class="addr">📍 ${o.addr}</div>
                ${rejectionsHtml}
                ${!isBusy ? 
                    `<button class="btn btn-main" onclick="takeOrder('${o.id}')">ВЗЯТЬ В РАБОТУ</button>
                     <div style="display:flex;gap:8px;margin-top:10px">
                        <button class="btn-small" onclick="editOrder('${o.id}')">ИЗМЕНИТЬ</button>
                        <button class="btn-small" onclick="deleteOrder('${o.id}')">УДАЛИТЬ</button>
                     </div>` : 
                    `<div style="background:rgba(255,193,7,0.1);padding:15px;border-radius:12px;text-align:center;margin:10px 0; border: 1px solid rgba(255,193,7,0.2)">
                        <a href="tel:${o.phone}" style="color:var(--main-gold);text-decoration:none;font-weight:bold;font-size:18px">${o.phone}</a>
                    </div>
                    <button id="btn-finish-${o.id}" class="btn btn-disabled" onclick="finishOrder('${o.id}', ${o.startTime})">ЗАВЕРШИТЬ (30:00)</button>
                    <button class="btn btn-outline" onclick="openRej('${o.id}')">ОТКАЗАТЬСЯ</button>`
                }
            `;
            container.appendChild(card);
        });
        updateTimers(); 
    }

    function updateTimers() {
        const now = Date.now();
        allOrders.forEach(o => {
            if (o.status === 'busy' && o.startTime) {
                const btn = document.getElementById(`btn-finish-${o.id}`);
                if (!btn) return;
                const diff = now - o.startTime;
                const waitTime = 30 * 60 * 1000;
                if (diff < waitTime) {
                    const remaining = waitTime - diff;
                    const mins = Math.floor(remaining / 60000);
                    const secs = Math.floor((remaining % 60000) / 1000);
                    btn.innerText = `ЗАВЕРШИТЬ (${mins}:${secs < 10 ? '0' : ''}${secs})`;
                    btn.disabled = true;
                } else {
                    btn.innerText = `ЗАВЕРШИТЬ ОБЪЕКТ`;
                    btn.classList.replace('btn-disabled', 'btn-success');
                    btn.disabled = false;
                }
            }
        });
    }

    function takeOrder(id) { db.ref(`shabashki/active/${id}`).update({ status: 'busy', startTime: firebase.database.ServerValue.TIMESTAMP }); }
    
    function finishOrder(id, startTime) {
        if (Date.now() - startTime < 30 * 60 * 1000) return;
        db.ref(`shabashki/active/${id}`).once('value', snap => {
            const o = snap.val();
            db.ref('shabashki/archive').push({...o, closedAt: new Date().toLocaleString('ru-RU', {hour:'2-digit', minute:'2-digit'})});
            db.ref(`shabashki/active/${id}`).remove();
        });
    }

    function saveOrder() {
        const editId = document.getElementById('edit-id').value;
        const id = editId || Date.now().toString();
        const data = {
            id, task: document.getElementById('task').value, addr: document.getElementById('address').value,
            phone: document.getElementById('phone').value, city: document.getElementById('city-input').value,
            date: new Date().toLocaleString('ru-RU', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'}),
            status: 'free', timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        if(!data.task || !data.addr || data.phone.length < 18) return alert("Заполните всё!");
        db.ref('shabashki/active/' + id).update(data).then(() => { resetForm(); changeView('list', document.querySelector('nav button')); });
    }

    function deleteOrder(id) { if(confirm("Удалить?")) db.ref(`shabashki/active/${id}`).remove(); }
    function editOrder(id) {
        const o = allOrders.find(x => x.id === id);
        document.getElementById('edit-id').value = o.id;
        document.getElementById('task').value = o.task;
        document.getElementById('address').value = o.addr;
        document.getElementById('phone').value = o.phone;
        document.getElementById('city-input').value = o.city;
        document.getElementById('save-btn').innerText = 'СОХРАНИТЬ';
        changeView('add', document.querySelectorAll('nav button')[1]);
    }

    function openRej(id) { currentRejId = id; document.getElementById('modal-rej').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-rej').style.display = 'none'; document.getElementById('rej-text').value = ''; }
    function submitRejection() {
        const text = document.getElementById('rej-text').value.trim();
        if(!text) return;
        db.ref(`shabashki/active/${currentRejId}/rejections`).push({ text });
        db.ref(`shabashki/active/${currentRejId}`).update({ status: 'free', startTime: null });
        closeModal();
    }

    function renderArchive(archived) {
        document.getElementById('archive-list').innerHTML = archived.map(o => `
            <div class="card" style="opacity:0.6"><div class="card-header"><span>${o.city}</span><span>${o.closedAt || ''}</span></div>
            <div class="badge-status" style="background:rgba(76,175,80,0.2);color:var(--success)">✅ ВЫПОЛНЕНО</div>
            <h3>${o.task}</h3><div class="addr">📍 ${o.addr}</div></div>`).join('') || '<div style="text-align:center;padding:50px;color:#444">Архив пуст</div>';
    }

    function changeView(view, btn) {
        document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        document.getElementById('city-tabs-ui').style.display = (view === 'list' ? 'flex' : 'none');
    }

    function setFilter(city, btn) {
        currentFilter = city;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active'); renderFiltered();
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('task').value = '';
        document.getElementById('address').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('save-btn').innerText = 'ОПУБЛИКОВАТЬ';
    }

    initSync();
</script>
</body>
</html>
