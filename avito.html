<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOLT MASTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #ffc107; --bg: #0f0f0f; --card: rgba(255,255,255,0.07); --danger: #ff4444; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        .site-stats { background: #000; color: #777; font-size: 10px; text-align: center; padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 15px; }
        .site-stats b { color: var(--gold); }
        .tabs { display: flex; background: #161616; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 18px; text-align: center; font-weight: bold; color: #888; cursor: pointer; font-size: 13px; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); background: rgba(255,193,7,0.05); }
        .search-container { padding: 10px 15px; background: #111; }
        .search-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; box-sizing: border-box; }
        .container { padding: 15px; max-width: 500px; margin: auto; min-height: 80vh; }
        .section { display: none; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 18px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .card img { width: 100%; height: auto; max-height: 400px; object-fit: contain; background: #000; display: block; }
        .info { padding: 15px; }
        .price { color: var(--gold); font-size: 22px; font-weight: 900; }
        .price.neg { color: #aaa; font-size: 16px; font-weight: 400; font-style: italic; }
        .title { font-size: 17px; font-weight: 600; margin: 5px 0; }
        .desc { font-size: 13px; color: #aaa; white-space: pre-wrap; margin-top: 8px; }
        .timer-bottom { text-align: center; padding: 8px; font-size: 11px; font-family: monospace; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); }
        .actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 10; }
        .btn-sm { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .form { background: #161616; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        input, textarea, select { width: 100%; margin-bottom: 12px; padding: 14px; border: 1px solid #333; border-radius: 12px; background: #000; color: #fff; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; }
        .tag-item { background: rgba(255,193,7,0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 8px; font-size: 12px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="site-stats">
    <span id="site-counter">ВИЗИТЫ: <b>...</b></span>
    <span id="my-id-display">ВАШ ID: <b>...</b></span>
</div>

<div class="tabs">
    <div id="t-view" class="tab active" onclick="tab('view')">📢 СТЕНА</div>
    <div id="t-create" class="tab" onclick="handleAdminAuth()">➕ ПОДАТЬ</div>
</div>

<div id="search-bar" class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск..." oninput="render()">
</div>

<div class="container">
    <div id="view" class="section active"><div id="feed"></div></div>
    <div id="create" class="section">
        <div id="admin-area"></div>
        <form id="adForm" class="form">
            <input type="text" id="inp-t" placeholder="Название" required>
            <input type="number" id="inp-p" placeholder="Цена (пусто — договорная)">
            <textarea id="inp-d" rows="4" placeholder="Описание..."></textarea>
            <input type="file" id="inp-f" accept="image/*" style="display:none" onchange="prepImg()">
            <button type="button" class="btn-main" style="background:#222; color:var(--gold); margin-bottom:12px" onclick="document.getElementById('inp-f').click()">📸 ФОТО</button>
            <div id="img-st" style="text-align:center; font-size:12px; margin-bottom:15px; color:var(--gold)"></div>
            <button type="button" id="btn-save" class="btn-main" onclick="save()">ОПУБЛИКОВАТЬ</button>
        </form>
    </div>
</div>

<script>
    firebase.initializeApp({ databaseURL: "https://kalculator-8e345-default-rtdb.firebaseio.com/" });
    const database = firebase.database();
    const DB_PATH = "marketplace_ads", ADMIN_PATH = "marketplace_settings", MS_IN_24H = 86400000, ETERNAL_VAL = 999;
    
    let MY_ID = localStorage.getItem('user_id_2026') || "ID-" + Math.floor(Math.random() * 10000);
    localStorage.setItem('user_id_2026', MY_ID);
    document.getElementById('my-id-display').innerHTML = `ВАШ ID: <b>${MY_ID}</b>`;

    let ads = [], whitelist = {}, curImg = "", editId = null, isAdmin = false, clickCount = 0, timerInt = null;
    let viewedAds = new Set();

    function handleAdminAuth() {
        clickCount++;
        if (clickCount === 3) {
            if (prompt("Пароль:") === "Gazik0303") { isAdmin = !isAdmin; render(); alert("АДМИН: " + (isAdmin ? "ВКЛ" : "ВЫКЛ")); }
            clickCount = 0;
        } else { setTimeout(() => clickCount = 0, 1000); }
        tab('create');
    }

    function tab(n) {
        document.querySelectorAll('.tab, .section').forEach(el => el.classList.remove('active'));
        document.getElementById('t-'+n).classList.add('active');
        document.getElementById(n).classList.add('active');
        document.getElementById('search-bar').style.display = (n === 'view') ? 'block' : 'none';
        if(n === 'view') { load(); startTick(); } else { stopTick(); }
    }

    async function load() {
        database.ref(DB_PATH).on('value', snap => {
            const data = snap.val(), now = Date.now();
            ads = (data ? Object.keys(data).map(k => ({...data[k], id: k})) : []).filter(a => {
                if (Number(a.ts) !== ETERNAL_VAL && (now - a.ts) >= MS_IN_24H) { database.ref(`${DB_PATH}/${a.id}`).remove(); return false; }
                return true;
            });
            render();
        });
        database.ref(`${ADMIN_PATH}/whitelist`).on('value', snap => { whitelist = snap.val() || {}; if(isAdmin) renderWhitelist(); });
    }

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const id = entry.target.getAttribute('data-id');
                if (id && !viewedAds.has(id)) {
                    viewedAds.add(id);
                    database.ref(`${DB_PATH}/${id}/views`).transaction(c => (c || 0) + 1);
                }
            }
        });
    }, { threshold: 0.6 });

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const adminArea = document.getElementById('admin-area');
        const feed = document.getElementById('feed');
        
        if(isAdmin) {
            adminArea.innerHTML = `<div class="form" style="margin-bottom:20px; border:1px solid var(--gold)">
                <div id="whitelist-tags" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px"></div>
                <div style="display:flex; gap:8px"><input type="text" id="w-id" placeholder="ID"><button class="btn-main" style="width:60px" onclick="addW()">+</button></div>
                <select id="p-type" style="margin-top:12px"><option value="n">24 Часа</option><option value="e">ВЕЧНОЕ</option></select>
            </div>`;
            renderWhitelist();
        } else { adminArea.innerHTML = ''; }

        const filtered = ads.filter(a => a.title.toLowerCase().includes(query) || a.desc.toLowerCase().includes(query))
            .sort((a,b) => (Number(a.ts) === ETERNAL_VAL ? -1 : Number(b.ts) === ETERNAL_VAL ? 1 : b.ts - a.ts));

        feed.innerHTML = filtered.map(a => {
            const isMine = a.owner === MY_ID;
            const isEternal = Number(a.ts) === ETERNAL_VAL;
            const priceHtml = (a.price && a.price > 0) ? `<span class="price">${Number(a.price).toLocaleString()} ₽</span>` : `<span class="price neg">Цена договорная</span>`;
            return `<div class="card" data-id="${a.id}">
                ${(isAdmin || isMine) ? `<div class="actions">
                    <button class="btn-sm" style="background:var(--gold)" onclick="edit('${a.id}')">✎</button>
                    <button class="btn-sm" style="background:var(--danger); color:#fff" onclick="del('${a.id}')">×</button>
                </div>` : ''}
                ${a.img ? `<img src="${a.img}" loading="lazy">` : ''}
                <div class="info">
                    <div style="display:flex; justify-content:space-between; align-items:center;">${priceHtml}<span style="color:#666; font-size:11px">👁 ${a.views || 0}</span></div>
                    <div class="title">${a.title}</div><div class="desc">${a.desc}</div>
                </div>
                ${isEternal ? `<div class="timer-bottom" style="color:var(--gold); font-weight:bold">ВЕЧНОЕ ОБЪЯВЛЕНИЕ</div>` : 
                ((isMine || isAdmin) ? `<div class="timer-bottom" id="timer-${a.id}" style="color:#888">...</div>` : '')}
            </div>`;
        }).join('');
        document.querySelectorAll('.card').forEach(c => observer.observe(c));
    }

    function tick() {
        const now = Date.now();
        ads.forEach(a => {
            const el = document.getElementById(`timer-${a.id}`);
            if(!el || Number(a.ts) === ETERNAL_VAL) return;
            const diff = MS_IN_24H - (now - a.ts);
            if(diff <= 0) { el.innerText = "УДАЛЕНИЕ..."; return; }
            const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            el.innerText = `ДО УДАЛЕНИЯ: ${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        });
    }

    function startTick() { stopTick(); timerInt = setInterval(tick, 1000); tick(); }
    function stopTick() { clearInterval(timerInt); }

    async function addW() { const id = document.getElementById('w-id').value; if(id) await database.ref(`${ADMIN_PATH}/whitelist/${id}`).set(true); }
    async function delW(id) { if(confirm("Удалить?")) await database.ref(`${ADMIN_PATH}/whitelist/${id}`).remove(); }
    function renderWhitelist() { 
        const c = document.getElementById('whitelist-tags'); if(!c) return;
        c.innerHTML = Object.keys(whitelist).map(id => `<div class="tag-item">${id}<b style="cursor:pointer; color:var(--danger)" onclick="delW('${id}')">×</b></div>`).join('');
    }

    function prepImg() {
        const file = document.getElementById('inp-f').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 800; let w = img.width, h = img.height;
                if (w > MAX) { h *= MAX/w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                curImg = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('img-st').innerText = "ГОТОВО ✅";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function save() {
        const now = Date.now();
        const lastPost = localStorage.getItem('last_post_time_2026') || 0;
        const isWhitelisted = whitelist[MY_ID] === true;

        if (!editId && !isAdmin && !isWhitelisted) {
            const hasInDb = ads.find(a => a.owner === MY_ID);
            if (hasInDb || (now - lastPost) < MS_IN_24H) return alert("Лимит: 1 пост в 24 часа.");
        }

        let postTs = now;
        if (isAdmin && document.getElementById('p-type').value === 'e') postTs = ETERNAL_VAL;
        else if (isWhitelisted) postTs = ETERNAL_VAL;

        const data = { 
            title: document.getElementById('inp-t').value, 
            price: document.getElementById('inp-p').value || 0,
            desc: document.getElementById('inp-d').value, img: curImg, owner: MY_ID, 
            views: editId ? (ads.find(x => x.id === editId)?.views || 0) : 0,
            ts: editId ? ads.find(x => x.id === editId).ts : postTs 
        };
        if(!data.title) return alert("Введите название!");
        await (editId ? database.ref(`${DB_PATH}/${editId}`) : database.ref(DB_PATH).push()).update(data);
        if(!editId && !isAdmin && !isWhitelisted) localStorage.setItem('last_post_time_2026', now);
        document.getElementById('adForm').reset(); curImg = ""; editId = null;
        document.getElementById('img-st').innerText = ""; tab('view');
    }

    async function del(id) { if(confirm("Удалить?")) await database.ref(`${DB_PATH}/${id}`).remove(); }
    function edit(id) { 
        const a = ads.find(x => x.id === id); editId = id;
        document.getElementById('inp-t').value = a.title; document.getElementById('inp-p').value = a.price > 0 ? a.price : ""; 
        document.getElementById('inp-d').value = a.desc; curImg = a.img; tab('create');
        document.getElementById('btn-save').innerText = "СОХРАНИТЬ";
    }

    database.ref(`${ADMIN_PATH}/totalVisits`).transaction(c => (c || 0) + 1);
    database.ref(`${ADMIN_PATH}/totalVisits`).on('value', s => document.getElementById('site-counter').innerHTML = `ВИЗИТЫ: <b>${s.val() || 0}</b>`);
    load(); startTick();
</script>
</body>
</html>
